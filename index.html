              : `<button class="detail-btn" data-act="ctl" data-ctl="pause"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5"/></svg> Pause</button>`}
            <button class="detail-btn primary" data-act="supervise"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg> Supervise</button>
          </div>`;
        const ctlBtn = el.agentDetail.querySelector('[data-act="ctl"]');
        if (ctlBtn) ctlBtn.onclick = () => controlAgent(agent.id, ctlBtn.getAttribute('data-ctl'));
        el.agentDetail.querySelector('[data-act="supervise"]').onclick = () => switchView('supervision');
        return;
      }

      const m = agent.metrics || seededMetrics(agent.id), isPaused = agent.status === 'paused';
      el.agentDetail.innerHTML = `
        ${head}
        <div class="agent-detail-task"><b>Current task</b><br>${esc(agent.task)}</div>
        <div class="agent-detail-meta">
          <div class="meta-tile"><div class="v">${m.tasks.toLocaleString()}</div><div class="l">Tasks</div></div>
          <div class="meta-tile"><div class="v">${m.success}%</div><div class="l">Success</div></div>
          <div class="meta-tile"><div class="v">${m.uptime}d</div><div class="l">Uptime</div></div>
        </div>
        <div class="agent-detail-actions">
          <button class="detail-btn" data-act="toggle-status">${isPaused
            ? '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/></svg> Resume'
            : '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5"/></svg> Pause'}</button>
          <button class="detail-btn primary" data-act="configure"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.398.164.855.142 1.205-.108l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124-.072.044-.146.087-.22.128-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87-.072-.041-.146-.083-.22-.127-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.43l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg> Configure</button>
        </div>`;
      el.agentDetail.querySelector('[data-act="toggle-status"]').onclick = () => toggleStatus(agent.id);
      el.agentDetail.querySelector('[data-act="configure"]').onclick = () => openAgentModal(agent);
    }

    function toggleStatus(id) {
      const agent = agents.find(x => x.id === id);
      if (!agent) return;
      agent.status = agent.status === 'paused' ? 'active' : 'paused';
      saveAgents(); renderWorkspace();
      toast(`“${agent.name}” ${agent.status === 'paused' ? 'paused' : 'resumed'}`, agent.status === 'paused' ? 'warn' : 'success');
    }

    /* ============================================================ RENDER: SLIDES + BEEHIVE ============================================================ */
    function renderSlides() {
      el.sliderTrack.innerHTML = agents.map((agent, index) => {
        const vsrc = AGENT_VIDEOS[agent.archetypeKey] || '';
        return `
        <div class="slider-slide${index === currentIndex ? ' active' : ''}" data-index="${index}" data-agent-id="${agent.id}">
          <img src="${getAgentImage(agent)}" alt="${esc(agent.name)} workspace" draggable="false">
          ${vsrc ? `<video class="agent-video" data-agent-id="${agent.id}" src="${vsrc}" muted playsinline preload="auto"></video>` : ''}
          <svg class="hex-outline" viewBox="0 0 100 100" preserveAspectRatio="none">
            <polygon points="50,4 91,27 91,72 51,96 9,71 9,27" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
          </svg>
        </div>`;
      }).join('');
      slides = Array.from(el.sliderTrack.querySelectorAll('.slider-slide'));
      slides.forEach((slide, index) => slide.addEventListener('click', (e) => { if (isBeehive) { e.stopPropagation(); exitBeehiveMode(index); } }));
    }

    function playAgentVideo(agentId) {
      const v = el.sliderTrack.querySelector(`.agent-video[data-agent-id="${agentId}"]`);
      if (!v) return;
      v.currentTime = 0;
      v.classList.add('playing');
      v.play().catch(() => {});
      v.onended = () => { v.classList.remove('playing'); v.onended = null; };
    }

    function playAllVideos() {
      el.sliderTrack.querySelectorAll('.agent-video').forEach(v => {
        v.currentTime = 0;
        v.classList.add('playing');
        v.play().catch(() => {});
        v.onended = () => { v.classList.remove('playing'); v.onended = null; };
      });
    }

    function getHexDistance(q, r) { return Math.max(Math.abs(q), Math.abs(r), Math.abs(-q - r)); }
    function generateAxialOrder(count) {
      const coords = [], radius = Math.max(1, count);
      for (let q = -radius; q <= radius; q++) for (let r = -radius; r <= radius; r++) { const d = getHexDistance(q, r); if (d <= radius) coords.push({ q, r, d }); }
      coords.sort((l, x) => {
        if (l.d !== x.d) return l.d - x.d;
        const ly = -l.r, xy = -x.r; if (ly !== xy) return ly - xy;
        const lx = 2 * l.q + l.r, xx = 2 * x.q + x.r; if (lx !== xx) return lx - xx;
        return l.q - x.q;
      });
      return coords.slice(0, count);
    }
    function beehivePosition(index) {
      const scaled = boxSize * beehiveScale, coords = generateAxialOrder(agents.length), c = coords[index] || { q: 0, r: 0 };
      return { x: (2 * c.q + c.r) * ratioX * scaled, y: -c.r * ratioY * scaled };
    }

    function initSlider() {
      slides.forEach((slide, i) => {
        gsap.killTweensOf(slide);
        slide.style.left = '0px'; slide.style.top = '0px'; slide.style.transition = '';
        if (i === currentIndex) { gsap.set(slide, { x: 0, y: 0, scale: 1, opacity: 1, pointerEvents: 'auto' }); slide.classList.add('active'); }
        else { gsap.set(slide, { x: 0, y: 0, scale: 0.85, opacity: 0, pointerEvents: 'none' }); slide.classList.remove('active'); }
      });
      updateVariantControls();
    }

    function applyBeehiveLayout(duration) {
      duration = Math.max(duration || 0.2, 0.2);
      slides.forEach((slide, i) => {
        gsap.killTweensOf(slide); slide.classList.add('active');
        const pos = beehivePosition(i);
        slide.style.transition = `opacity ${duration}s ease, transform ${duration}s cubic-bezier(0.22,1,0.36,1)`;
        slide.style.left = pos.x + 'px'; slide.style.top = pos.y + 'px';
        slide.style.pointerEvents = 'auto'; slide.style.opacity = '1'; slide.style.transform = `scale(${beehiveScale})`;
      });
    }

    function showSlide(index, direction) {
      if (isBeehive || index === currentIndex || !slides[index]) return;
      const cur = slides[currentIndex], next = slides[index];
      gsap.killTweensOf(cur); gsap.killTweensOf(next);
      const xOffset = direction === 'next' ? 120 : -120;
      gsap.to(cur, { x: -xOffset, scale: 0.85, opacity: 0, pointerEvents: 'none', duration: 0.45, ease: 'power2.inOut', onComplete: () => cur.classList.remove('active') });
      gsap.set(next, { x: xOffset, scale: 0.85, opacity: 0 });
      next.classList.add('active');
      gsap.to(next, { x: 0, scale: 1, opacity: 1, pointerEvents: 'auto', duration: 0.45, ease: 'power2.inOut' });
      currentIndex = index;
      renderAgentList(); renderDetail(); updateVariantControls();
      playAgentVideo(agents[index]?.id);
    }

    function enterBeehiveMode() {
      if (agents.length < 2) { toast('Add another agent to see the hive', 'info'); return; }
      isBeehive = true;
      el.sliderWrapper.classList.add('beehive-mode');
      el.toggleBtnText.textContent = 'Focus';
      el.topbarSub.textContent = 'Hive view · click a node to focus';
      renderDetail();
      gsap.to([el.btnPrev, el.btnNext], { opacity: 0, pointerEvents: 'none', duration: 0.3 });
      applyBeehiveLayout(0.7); updateVariantControls();
      playAllVideos();
    }

    function exitBeehiveMode(targetIndex) {
      if (targetIndex == null) targetIndex = currentIndex;
      isBeehive = false;
      el.sliderWrapper.classList.remove('beehive-mode');
      el.toggleBtnText.textContent = 'Nodes';
      el.topbarSub.textContent = 'Your live agent fleet';
      currentIndex = clamp(targetIndex, 0, agents.length - 1);
      renderAgentList(); updateVariantControls();

      slides.forEach((slide, i) => {
        gsap.killTweensOf(slide);
        // Capture beehive CSS offsets BEFORE we zero them
        const bx = parseFloat(slide.style.left) || 0;
        const by = parseFloat(slide.style.top) || 0;
        slide.style.left = '0px'; slide.style.top = '0px'; slide.style.transition = '';

        if (i === currentIndex) {
          slide.classList.add('active');
          // Zoom the chosen agent in from its beehive spot to fill the viewport
          gsap.fromTo(slide,
            { x: bx, y: by, scale: beehiveScale, opacity: 1 },
            { x: 0, y: 0, scale: 1, opacity: 1, pointerEvents: 'auto',
              duration: 0.75, ease: 'power3.inOut' }
          );
        } else {
          // Others shrink in place and dissolve
          gsap.fromTo(slide,
            { x: bx, y: by, scale: beehiveScale, opacity: 1 },
            { x: bx, y: by, scale: beehiveScale * 0.55, opacity: 0,
              pointerEvents: 'none', duration: 0.3, ease: 'power2.in',
              onComplete: () => {
                slide.classList.remove('active');
                gsap.set(slide, { x: 0, y: 0, scale: 0.85, opacity: 0 });
              }
            }
          );
        }
      });

      // Arrows and detail panel appear after the zoom lands
      gsap.to([el.btnPrev, el.btnNext], { opacity: 1, pointerEvents: 'auto', duration: 0.3, delay: 0.55 });
      setTimeout(() => renderDetail(), 500);
      playAgentVideo(agents[currentIndex]?.id);
    }

    function updateVariantControls() {
      const agent = agents[currentIndex], scene = agent ? SCENES[agent.sceneKey] : null;
      const showable = currentView === 'home' && !isBeehive && scene && scene.variants;
      el.variantControls.classList.toggle('visible', !!showable);
      if (!showable) return;
      el.variantLabel.textContent = agent.variantIndex === 0 ? 'Default layout' : `Layout ${agent.variantIndex}/${scene.variants.length - 1}`;
    }
    function setVariant(index) {
      const agent = agents[currentIndex]; if (!agent) return;
      const scene = SCENES[agent.sceneKey]; if (!scene || !scene.variants) return;
      agent.variantIndex = (index + scene.variants.length) % scene.variants.length;
      saveAgents(); renderSlides(); initSlider();
    }

    function focusAgent(index) {
      if (index < 0 || index >= agents.length) return;
      if (currentView !== 'home') switchView('home');
      currentIndex = index;
      if (isBeehive) exitBeehiveMode(index);
      else { initSlider(); renderAgentList(); renderDetail(); }
    }

    function renderWorkspace() {
      currentIndex = clamp(currentIndex, 0, Math.max(0, agents.length - 1));
      renderSlides(); renderAgentList(); initSlider(); renderDetail();
      if (isBeehive && agents.length >= 2) applyBeehiveLayout(0.2);
      else if (isBeehive) exitBeehiveMode(currentIndex);
    }

    /* ============================================================ RENDER: INTEGRATIONS ============================================================ */
    function renderIntegrations() {
      el.navIntCount.textContent = integrations.filter(i => i.connected).length;
      if (!el.integrationGrid) { renderCreatePanel(); return; }
      el.integrationGrid.innerHTML = integrations.map(i => `
        <div class="integration-card">
          <div class="integration-top">
            <div class="integration-icon" style="background:${i.color}">${esc(i.mono)}</div>
            <div><div class="integration-name">${esc(i.name)}</div><div class="integration-cat">${esc(i.cat)}</div></div>
          </div>
          <div class="integration-desc">${esc(i.desc)}</div>
          <div class="integration-foot">
            <span class="conn-state${i.connected ? ' on' : ''}"><span class="dot"></span>${i.connected ? 'Connected' : 'Not connected'}</span>
            <button class="conn-btn${i.connected ? ' on' : ''}" data-int="${i.key}">${i.connected ? 'Disconnect' : 'Connect'}</button>
          </div>
        </div>`).join('');
      el.integrationGrid.querySelectorAll('[data-int]').forEach(btn => btn.onclick = () => {
        const it = integrations.find(x => x.key === btn.getAttribute('data-int')); if (!it) return;
        it.connected = !it.connected; saveIntegrations(); renderIntegrations();
        toast(`${it.name} ${it.connected ? 'connected' : 'disconnected'}`, it.connected ? 'success' : 'warn');
      });
    }

    /* ============================================================ RENDER: ANALYTICS ============================================================ */
    function renderAnalyticsLive() {
      const total = agents.length;
      const byStatus = { active: 0, idle: 0, degraded: 0, flagged: 0 };
      agents.forEach(a => byStatus[a.status] = (byStatus[a.status] || 0) + 1);
      const totalCalls = agents.reduce((s, a) => s + (a.live?.calls || 0), 0);
      const totalTokens = agents.reduce((s, a) => s + (a.live?.tokens || 0), 0);
      const totalCost = agents.reduce((s, a) => s + (a.live?.cost || 0), 0);
      const qVals = agents.map(a => a.live?.quality).filter(v => v != null);
      const avgQ = qVals.length ? qVals.reduce((s, v) => s + v, 0) / qVals.length : 0;
      const flagged = byStatus.flagged || 0;

      const segs = [
        { k: 'active', c: 'var(--green)' }, { k: 'idle', c: 'var(--slate)' },
        { k: 'degraded', c: 'var(--amber)' }, { k: 'flagged', c: 'var(--red)' }
      ];
      let acc = 0; const stops = [];
      segs.forEach(s => { const pct = total ? (byStatus[s.k] / total) * 100 : 0; stops.push(`${s.c} ${acc}% ${acc + pct}%`); acc += pct; });
      if (total === 0) stops.push('var(--bg-panel-2) 0% 100%');

      const byCost = [...agents].sort((a, b) => (b.live?.cost || 0) - (a.live?.cost || 0));
      const maxCost = Math.max(0.0001, ...byCost.map(a => a.live?.cost || 0));
      const byTokens = [...agents].sort((a, b) => (b.live?.tokens || 0) - (a.live?.tokens || 0));
      const maxTok = Math.max(1, ...byTokens.map(a => a.live?.tokens || 0));

      const org = orgState || {};
      el.analyticsInner.innerHTML = `
        <div class="section-eyebrow">Live · Argus governance</div>
        <div class="stat-grid">
          <div class="stat-card"><div class="l"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 012.012 1.244l.256.512a2.25 2.25 0 002.013 1.244h3.218a2.25 2.25 0 002.013-1.244l.256-.512a2.25 2.25 0 012.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 00-2.15-1.588H6.911a2.25 2.25 0 00-2.15 1.588L2.35 13.177a2.25 2.25 0 00-.1.661z"/></svg>LLM calls</div><div class="v">${totalCalls.toLocaleString()}</div><div class="s">across the fleet</div></div>
          <div class="stat-card"><div class="l"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Total spend</div><div class="v">${fmtCost(totalCost)}</div><div class="s">${totalTokens.toLocaleString()} tokens</div></div>
          <div class="stat-card"><div class="l"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Avg quality</div><div class="v">${Math.round(avgQ * 100)}%</div><div class="s">judge-scored output</div></div>
          <div class="stat-card"><div class="l"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3v1.5M3 21v-6m0 0l2.77-.693a9 9 0 016.208.682l.108.054a9 9 0 006.086.71l3.114-.732a48.524 48.524 0 01-.005-10.499l-3.11.732a9 9 0 01-6.085-.711l-.108-.054a9 9 0 00-6.208-.682L3 4.5M3 15V4.5"/></svg>Flagged agents</div><div class="v" style="color:${flagged ? 'var(--red)' : 'var(--text-strong)'}">${flagged}</div><div class="s">anomaly / over-budget</div></div>
          <div class="stat-card" title="Estimate: ${ENERGY.whPer1kTokens} Wh per 1k tokens · ${ENERGY.co2gPerKwh} g CO₂ per kWh"><div class="l"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/></svg>Energy avoided</div><div class="v" style="color:var(--green)">${esc(fmtEnergy(tokensToWh((orgState && orgState.tokens_saved) || 0)))}</div><div class="s">≈ ${esc(fmtCo2(whToCo2g(tokensToWh((orgState && orgState.tokens_saved) || 0))))} CO₂ · ${(orgState && orgState.avoided_calls) || 0} calls skipped</div></div>
        </div>
        ${org.budget ? `<div class="data-panel" style="margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
          <div><h3 style="margin-bottom:4px;">Org token budget</h3><div style="font-size:12px;color:var(--text-muted)">${Number(org.used).toLocaleString()} of ${Number(org.budget).toLocaleString()} used · ${Number(org.remaining).toLocaleString()} remaining</div></div>
          <div style="flex:1;min-width:200px;"><div class="util-bar" style="height:10px;"><span style="width:${Math.min(100,(org.used/org.budget)*100)}%;background:var(--accent)"></span></div></div>
        </div>` : ''}
        <div class="panel-grid">
          <div class="data-panel">
            <h3>Fleet status</h3>
            <div class="donut-wrap">
              <div class="donut" style="background:conic-gradient(${stops.join(',')})"><div class="donut-center"><div class="v">${total}</div><div class="l">Agents</div></div></div>
              <div class="donut-legend">${segs.map(s => `<div class="legend-row"><span class="sw" style="background:${s.c}"></span>${STATUSES[s.k].label}<b>${byStatus[s.k] || 0}</b></div>`).join('')}</div>
            </div>
          </div>
          <div class="data-panel">
            <h3>Spend by agent</h3>
            ${byCost.map(a => { const c = a.live?.cost || 0; return `<div class="bar-row"><div class="bar-label">${esc(a.name)}</div><div class="bar-track"><div class="bar-fill" style="width:${(c/maxCost)*100}%;background:${archetype(a.archetypeKey).accent}"></div></div><div class="bar-val">${fmtCost(c)}</div></div>`; }).join('')}
          </div>
        </div>
        <div class="data-panel" style="margin-bottom:24px;">
          <h3>Tokens consumed</h3>
          ${byTokens.map(a => { const t = a.live?.tokens || 0; return `<div class="bar-row"><div class="bar-label">${esc(a.name)}</div><div class="bar-track"><div class="bar-fill" style="width:${(t/maxTok)*100}%;background:${archetype(a.archetypeKey).accent}"></div></div><div class="bar-val">${(t/1000).toFixed(1)}k</div></div>`; }).join('')}
        </div>
        <div class="data-panel">
          <h3>Fleet roster</h3>
          <table class="roster">
            <thead><tr><th>Agent</th><th>Model</th><th style="text-align:right">Calls</th><th style="text-align:right">Tokens</th><th style="text-align:right">Spend</th><th>Status</th></tr></thead>
            <tbody>${agents.map(a => { const st = STATUSES[a.status] || STATUSES.active, L = a.live || {}; return `<tr><td>${esc(a.name)}</td><td><span class="model-chip">${esc(modelLabel(a.model))}</span></td><td style="text-align:right">${(L.calls||0).toLocaleString()}</td><td style="text-align:right">${(L.tokens||0).toLocaleString()}</td><td style="text-align:right;font-weight:700">${fmtCost(L.cost)}</td><td><span class="status-badge ${st.cls}"><span class="dot"></span>${st.label}</span></td></tr>`; }).join('')}</tbody>
          </table>
        </div>`;
    }

    function renderAnalytics() {
      if (isLive()) return renderAnalyticsLive();
      const total = agents.length, byStatus = { active: 0, idle: 0, paused: 0 };
      agents.forEach(a => byStatus[a.status] = (byStatus[a.status] || 0) + 1);
      const totalTasks = agents.reduce((s, a) => s + (a.metrics ? a.metrics.tasks : 0), 0);
      const avgSuccess = total ? agents.reduce((s, a) => s + (a.metrics ? a.metrics.success : 0), 0) / total : 0;

      const segs = [{ k: 'active', c: 'var(--green)' }, { k: 'idle', c: 'var(--slate)' }, { k: 'paused', c: 'var(--amber)' }];
      let acc = 0; const stops = [];
      segs.forEach(s => { const pct = total ? (byStatus[s.k] / total) * 100 : 0; stops.push(`${s.c} ${acc}% ${acc + pct}%`); acc += pct; });
      if (total === 0) stops.push('var(--bg-panel-2) 0% 100%');

      const archCounts = {}; agents.forEach(a => archCounts[a.archetypeKey] = (archCounts[a.archetypeKey] || 0) + 1);
      const maxArch = Math.max(1, ...Object.values(archCounts));
      const workload = [...agents].sort((a, b) => (b.metrics?.tasks || 0) - (a.metrics?.tasks || 0)).slice(0, 6);
      const maxTasks = Math.max(1, ...workload.map(a => a.metrics?.tasks || 0));

      el.analyticsInner.innerHTML = `
        <div class="section-eyebrow">Fleet overview</div>
        <div class="stat-grid">
          <div class="stat-card"><div class="l"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07"/></svg>Total agents</div><div class="v">${total}</div><div class="s">${byStatus.active} active right now</div></div>
          <div class="stat-card"><div class="l"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Tasks completed</div><div class="v">${totalTasks.toLocaleString()}</div><div class="s">across the whole fleet</div></div>
          <div class="stat-card"><div class="l"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75z"/></svg>Avg success</div><div class="v">${avgSuccess.toFixed(1)}%</div><div class="s">rolling 30-day window</div></div>
          <div class="stat-card"><div class="l"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>Integrations</div><div class="v">${integrations.filter(i=>i.connected).length}/${integrations.length}</div><div class="s">connected services</div></div>
        </div>
        <div class="panel-grid">
          <div class="data-panel">
            <h3>Status distribution</h3>
            <div class="donut-wrap">
              <div class="donut" style="background:conic-gradient(${stops.join(',')})"><div class="donut-center"><div class="v">${total}</div><div class="l">Agents</div></div></div>
              <div class="donut-legend">${segs.map(s => `<div class="legend-row"><span class="sw" style="background:${s.c}"></span>${STATUSES[s.k].label}<b>${byStatus[s.k] || 0}</b></div>`).join('')}</div>
            </div>
          </div>
          <div class="data-panel">
            <h3>Agents by character</h3>
            ${ARCHETYPES.filter(a => archCounts[a.key]).map(a => { const v = archCounts[a.key] || 0; return `<div class="bar-row"><div class="bar-label">${esc(a.name)}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxArch)*100}%;background:${a.accent}"></div></div><div class="bar-val">${v}</div></div>`; }).join('') || '<p style="font-size:13px;color:var(--text-muted)">No agents to chart.</p>'}
          </div>
        </div>
        <div class="data-panel" style="margin-bottom:24px;">
          <h3>Workload — tasks completed</h3>
          ${workload.map(a => { const arch = archetype(a.archetypeKey), v = a.metrics?.tasks || 0; return `<div class="bar-row"><div class="bar-label">${esc(a.name)}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxTasks)*100}%;background:${arch.accent}"></div></div><div class="bar-val">${v}</div></div>`; }).join('') || '<p style="font-size:13px;color:var(--text-muted)">No agents to chart.</p>'}
        </div>
        <div class="data-panel">
          <h3>Fleet roster</h3>
          <table class="roster">
            <thead><tr><th>Agent</th><th>Role</th><th>Model</th><th>Status</th><th style="text-align:right">Success</th></tr></thead>
            <tbody>${agents.map(a => { const st = STATUSES[a.status] || STATUSES.active; return `<tr><td>${esc(a.name)}</td><td style="color:var(--text-muted)">${esc(a.role)}</td><td><span class="model-chip">${esc(modelLabel(a.model))}</span></td><td><span class="status-badge ${st.cls}"><span class="dot"></span>${st.label}</span></td><td style="text-align:right;font-weight:700">${a.metrics?.success ?? '—'}%</td></tr>`; }).join('')}</tbody>
          </table>
        </div>`;
    }

    /* ============================================================ VIEW SWITCH ============================================================ */
    const VIEW_META = {
      home:         { h: 'Workspace',    sub: 'Your live agent fleet' },
      integrations: { h: 'New Agent',    sub: 'Deploy a new agent into Argus' },
      analytics:    { h: 'Analytics',    sub: 'Performance across your fleet' },
      supervision:  { h: 'Supervision',  sub: 'Keep humans in control of every agent' },
      audit:        { h: 'Audit',        sub: 'A full, exportable trail of agent activity' }
    };
    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.nav-item[data-view]').forEach(n => n.classList.toggle('active', n.getAttribute('data-view') === view));
      document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + view));
      el.topbarH.textContent = VIEW_META[view].h;
      el.topbarSub.textContent = (view === 'home' && isBeehive) ? 'Hive view · click a node to focus' : VIEW_META[view].sub;
      el.toggleViewMode.style.display = view === 'home' ? 'inline-flex' : 'none';
      if (view === 'integrations') renderIntegrations();
      if (view === 'analytics') renderAnalytics();
      if (view === 'supervision') renderSupervision();
      if (view === 'audit') { renderAudit(); fetchAudit().then(() => { if (currentView === 'audit') renderAudit(); }); }
      renderDetail(); updateVariantControls();
    }

    /* ============================================================ SETTINGS + ACCOUNT ============================================================ */
    function applyTheme() { document.documentElement.setAttribute('data-theme', settings.theme === 'dark' ? 'dark' : 'light'); }

    function openSettings() {
      const dark = settings.theme === 'dark';
      openModal(`
        <div class="modal-head"><div><h2>Settings</h2><p>Workspace preferences</p></div>
          <button class="modal-close" data-act="close"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div class="field" style="margin-bottom:6px;">
          <label for="set-api">Argus backend URL</label>
          <div style="display:flex;gap:8px;">
            <input type="text" id="set-api" value="${esc(settings.apiBase || '')}" placeholder="http://localhost:8000" style="flex:1;">
            <button class="btn primary" id="set-connect" style="flex:0 0 auto;padding:11px 16px;">Connect</button>
          </div>
          <div id="set-conn-status" style="font-size:12px;margin-top:8px;color:var(--text-muted);">${isLive() ? '● Connected — showing live agents.' : 'Not connected — showing demo agents.'}</div>
        </div>
        <div class="setting-row"><div class="info"><strong>Data source</strong><span>Use the bundled demo fleet instead of the backend</span></div><button class="btn" id="set-demo" style="flex:0 0 auto;padding:9px 14px;">Use demo</button></div>
        <div class="setting-row"><div class="info"><strong>Dark mode</strong><span>Switch the workspace to a dark theme</span></div><button class="switch${dark ? ' on' : ''}" id="set-theme" aria-label="Toggle dark mode"></button></div>
        <div class="setting-row"><div class="info"><strong>Keyboard shortcuts</strong><span>[ / ] toggle panels · ← → switch agent · N new agent</span></div></div>
        <div class="setting-row"><div class="info"><strong>Reset workspace</strong><span>Restore the default agents and integrations</span></div><button class="btn danger" id="set-reset" style="flex:0 0 auto;padding:9px 14px;">Reset</button></div>
        <div class="modal-foot"><button class="btn primary" data-act="close">Done</button></div>`);
      el.modalBox.querySelectorAll('[data-act="close"]').forEach(b => b.onclick = closeModal);
      $('set-connect').onclick = async () => {
        const url = $('set-api').value.trim();
        if (url) { settings.apiBase = url; saveSettings(); }
        const statusEl = $('set-conn-status');
        statusEl.textContent = 'Connecting…';
        const ok = await syncBackend({ manual: true });
        statusEl.textContent = ok ? '● Connected — showing live agents.' : '× Could not reach the backend. Is uvicorn running?';
        statusEl.style.color = ok ? 'var(--green)' : 'var(--red)';
      };
      $('set-demo').onclick = () => {
        useDemoData();
        const statusEl = $('set-conn-status');
        statusEl.textContent = 'Showing demo agents.';
        statusEl.style.color = 'var(--text-muted)';
        toast('Switched to demo data', 'info');
      };
      $('set-theme').onclick = (e) => {
        settings.theme = settings.theme === 'dark' ? 'light' : 'dark';
        applyTheme(); saveSettings();
        e.currentTarget.classList.toggle('on', settings.theme === 'dark');
        if (currentView === 'analytics') renderAnalytics();
      };
      $('set-reset').onclick = () => confirmDialog({
        title: 'Reset workspace?', body: 'This removes your custom agents and integration choices, restoring the defaults. This cannot be undone.',
        confirmLabel: 'Reset everything', danger: true,
        onConfirm: () => {
          try { localStorage.removeItem(LS.agents); localStorage.removeItem(LS.integrations); } catch {}
          dataSource = 'demo'; orgState = null;
          agents = loadAgents(); integrations = loadIntegrations(); currentIndex = 0; isBeehive = false;
          saveAgents(); saveIntegrations(); updateLiveChip(); switchView('home'); renderWorkspace(); toast('Workspace reset', 'success');
        }
      });
    }

    function toggleAccountPopover() {
      const pop = el.accountPopover;
      if (pop.classList.contains('open')) { pop.classList.remove('open'); return; }
      pop.innerHTML = `
        <div class="popover-head"><div class="avatar-placeholder">AF</div><div><strong>Andrii Fedorov</strong><span>Workspace owner</span></div></div>
        <div class="popover-divider"></div>
        <button class="popover-item" data-act="settings"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.398.164.855.142 1.205-.108l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124-.072.044-.146.087-.22.128-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87-.072-.041-.146-.083-.22-.127-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.43l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Settings</button>
        <button class="popover-item" data-act="reset"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>Reset workspace</button>`;
      const rect = el.accountBtn.getBoundingClientRect();
      pop.style.left = rect.left + 'px';
      pop.style.bottom = (window.innerHeight - rect.top + 8) + 'px';
      pop.classList.add('open');
      pop.querySelector('[data-act="settings"]').onclick = () => { pop.classList.remove('open'); openSettings(); };
      pop.querySelector('[data-act="reset"]').onclick = () => { pop.classList.remove('open'); openSettings(); };
    }

    /* ============================================================ EVENTS ============================================================ */
    function wire() {
      el.toggleLeft.onclick = () => el.sidebarLeft.classList.toggle('collapsed');
      el.toggleRight.onclick = () => el.sidebarRight.classList.toggle('collapsed');
      el.btnPrev.onclick = () => showSlide((currentIndex - 1 + agents.length) % agents.length, 'prev');
      el.btnNext.onclick = () => showSlide((currentIndex + 1) % agents.length, 'next');
      el.toggleViewMode.onclick = () => { isBeehive ? exitBeehiveMode() : enterBeehiveMode(); };
      el.variantPrev.onclick = (e) => { e.stopPropagation(); setVariant((agents[currentIndex]?.variantIndex || 0) - 1); };
      el.variantNext.onclick = (e) => { e.stopPropagation(); setVariant((agents[currentIndex]?.variantIndex || 0) + 1); };
      el.addAgentBtn.onclick = () => openAgentModal(null);
      $('cap-generate').onclick = () => generateAgentWithAI();
      $('cap-add').onclick = () => addAgentFromPanel();
      $('cap-task').addEventListener('input', () => {
        // Reset AI prediction state when user changes the task
        const savBox = $('cap-savings-box');
        const savIcon = $('cap-savings-icon');
        const savText = $('cap-savings-text');
        if (savBox) savBox.classList.remove('ai-predicted');
        if (savIcon) savIcon.textContent = '⚡';
        if (savText) savText.innerHTML = `With Argus your agent saves ~<b id="cap-savings-pct">${computeSavingsPct($('cap-task').value)}</b>% of compute via caching &amp; dedup`;
      });

      el.agentList.addEventListener('click', (e) => {
        const t = e.target.closest('[data-edit], [data-delete], [data-focus]'); if (!t) return;
        const editId = t.getAttribute('data-edit');
        if (editId) { e.stopPropagation(); const a = agents.find(x => x.id === editId); if (a) openAgentModal(a); return; }
        const delId = t.getAttribute('data-delete');
        if (delId) { e.stopPropagation(); requestDelete(delId); return; }
        const focusId = t.getAttribute('data-focus');
        if (focusId) focusAgent(agents.findIndex(x => x.id === focusId));
      });
      el.agentList.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const item = e.target.closest('[data-focus]');
        if (item) { e.preventDefault(); focusAgent(agents.findIndex(x => x.id === item.getAttribute('data-focus'))); }
      });

      document.querySelectorAll('.nav-item[data-view]').forEach(n => n.onclick = () => switchView(n.getAttribute('data-view')));
      el.liveChip.onclick = () => syncBackend({ manual: true });
      el.settingsBtn.onclick = openSettings;
      el.accountBtn.onclick = (e) => { e.stopPropagation(); toggleAccountPopover(); };
      document.addEventListener('click', (e) => {
        if (el.accountPopover.classList.contains('open') && !el.accountPopover.contains(e.target) && !el.accountBtn.contains(e.target)) el.accountPopover.classList.remove('open');
      });
      el.modalOverlay.addEventListener('click', (e) => { if (e.target === el.modalOverlay) closeModal(); });
      document.addEventListener('keydown', handleHotkeys);
    }

    function requestDelete(id) {
      if (agents.length <= 1) { toast('You need at least one agent', 'warn'); return; }
      const agent = agents.find(x => x.id === id); if (!agent) return;
      confirmDialog({
        title: 'Remove agent?', body: `“${agent.name}” will be removed from your workspace. This cannot be undone.`,
        confirmLabel: 'Remove agent', danger: true,
        onConfirm: () => {
          const idx = agents.findIndex(x => x.id === id); if (idx < 0) return;
          agents.splice(idx, 1); currentIndex = clamp(currentIndex, 0, agents.length - 1);
          saveAgents(); renderWorkspace(); toast(`“${agent.name}” removed`, 'warn');
        }
      });
    }

    function handleHotkeys(e) {
      const typing = /^(INPUT|SELECT|TEXTAREA)$/.test(document.activeElement.tagName);
      if (e.key === 'Escape') {
        if (el.modalOverlay.classList.contains('open')) closeModal();
        else if (el.accountPopover.classList.contains('open')) el.accountPopover.classList.remove('open');
        else if (isBeehive) exitBeehiveMode();
        return;
      }
      if (typing || el.modalOverlay.classList.contains('open')) return;
      if (e.key === '[') el.sidebarLeft.classList.toggle('collapsed');
      else if (e.key === ']') el.sidebarRight.classList.toggle('collapsed');
      else if ((e.key === 'n' || e.key === 'N') && !isLive()) { e.preventDefault(); openAgentModal(null); }
      else if (currentView === 'home' && !isBeehive) {
        if (e.key === 'ArrowLeft') showSlide((currentIndex - 1 + agents.length) % agents.length, 'prev');
        else if (e.key === 'ArrowRight') showSlide((currentIndex + 1) % agents.length, 'next');
      }
    }

    /* ============================================================ CREATE AGENT PANEL ============================================================ */
    let capSelectedArch = 'guardian';
    let capGenerated = null;   // { role, model, task } from AI

    function computeSavingsPct(taskText) {
      // Live mode: use real backend cache hit rate
      if (orgState?.cache_hit_rate) return Math.round(orgState.cache_hit_rate * 100);
      // Demo mode: predict from fleet size + task similarity to existing agents
      const n = agents.length;
      const base = Math.min(85, 35 + n * 8);
      const newWords = new Set((taskText || '').toLowerCase().split(/\W+/).filter(w => w.length > 3));
      if (!newWords.size) return base;
      const overlap = agents.filter(a => {
        const existing = ((a.currentTask || '') + ' ' + (a.role || '')).toLowerCase().split(/\W+/);
        return existing.some(w => w.length > 3 && newWords.has(w));
      }).length;
      return Math.min(94, base + Math.round((overlap / Math.max(1, n)) * 18));
    }

    function renderCreatePanel() {
      // Skin picker
      const skinsEl = $('cap-skins');
      if (!skinsEl) return;
      skinsEl.innerHTML = ARCHETYPES.map(a => {
        const scene = SCENES[a.sceneKey];
        return `
          <div>
            <div class="cap-skin${a.key === capSelectedArch ? ' selected' : ''}" data-arch="${a.key}" title="${a.name}">
              <img src="${scene.baseImage}" alt="${a.name}" loading="lazy">
            </div>
            <div class="cap-skin-label">${a.name}</div>
          </div>`;
      }).join('');
      skinsEl.querySelectorAll('.cap-skin').forEach(el => {
        el.addEventListener('click', () => {
          capSelectedArch = el.dataset.arch;
          renderCreatePanel();
        });
      });
      // Savings prediction — don't overwrite if AI has already set a predicted value
      const savBox = $('cap-savings-box');
      if (!savBox || !savBox.classList.contains('ai-predicted')) {
        const savEl = $('cap-savings-pct');
        if (savEl) savEl.textContent = computeSavingsPct($('cap-task')?.value || '');
      }
    }

    async function generateAgentWithAI() {
      const name = ($('cap-name').value || '').trim();
      const task = ($('cap-task').value || '').trim();
      if (!name || !task) { toast('Enter a name and task first', 'warn'); return; }
      if (!isLive()) { toast('Start the Argus backend to use AI generation', 'warn'); return; }

      const btn = $('cap-generate');
      btn.disabled = true; btn.textContent = '⏳ Generating…';

      const savingsPct = computeSavingsPct(task);

      try {
        const resp = await fetch(apiBase() + '/v1/generate-agent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, task, savings_pct: savingsPct })
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        capGenerated = await resp.json();
        const resEl = $('cap-result');
        resEl.innerHTML = `<strong>AI suggestion</strong>Role: ${esc(capGenerated.role)}<br>Model: ${esc(capGenerated.model)}<br>Task: ${esc(capGenerated.task)}`;
        resEl.classList.add('visible');

        // Update savings prediction with AI-reasoned value
        if (capGenerated.savings_pct) {
          const pct = Math.max(35, Math.min(92, parseInt(capGenerated.savings_pct) || 68));
          const savEl = $('cap-savings-pct');
          const savBox = $('cap-savings-box');
          const savIcon = $('cap-savings-icon');
          const savText = $('cap-savings-text');
          if (savEl) savEl.textContent = pct;
          if (savBox) savBox.classList.add('ai-predicted');
          if (savIcon) savIcon.textContent = '✦';
          if (savText) savText.innerHTML = `Argus predicts <b id="cap-savings-pct">${pct}</b>% compute savings for this task<span class="cap-savings-label">AI</span>`;
        }

        toast('Agent config generated', 'success');
      } catch (e) {
        toast('Generation failed: ' + e.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = '✦ Generate with AI';
      }
    }

    function addAgentFromPanel() {
      const name = ($('cap-name').value || '').trim();
      if (!name) { toast('Enter a name first', 'warn'); return; }
      const task = ($('cap-task').value || '').trim() || archetype(capSelectedArch).task;
      const role = capGenerated?.role || archetype(capSelectedArch).role;
      const model = capGenerated?.model || MODELS[0].id;
      const a = archetype(capSelectedArch);
      agents.push({
        id: uid(), name, archetypeKey: capSelectedArch, sceneKey: a.sceneKey, variantIndex: 0,
        role, model, status: 'active', task: capGenerated?.task || task, metrics: seededMetrics(uid())
      });
      currentIndex = agents.length - 1;
      saveAgents();
      // reset panel
      $('cap-name').value = ''; $('cap-task').value = ''; capGenerated = null;
      const resEl = $('cap-result'); resEl.innerHTML = ''; resEl.classList.remove('visible');
      // Reset AI savings state
      const savBox = $('cap-savings-box'); const savIcon = $('cap-savings-icon'); const savText = $('cap-savings-text');
      if (savBox) savBox.classList.remove('ai-predicted');
      if (savIcon) savIcon.textContent = '⚡';
      if (savText) savText.innerHTML = `With Argus your agent saves ~<b id="cap-savings-pct">68</b>% of compute via caching &amp; dedup`;
      capSelectedArch = 'guardian'; renderCreatePanel();
      if (currentView !== 'home') switchView('home');
      renderWorkspace();
      toast(`"${name}" deployed`, 'success');
    }

    /* ============================================================ INIT ============================================================ */
    function init() {
      el = {
        sidebarLeft: $('sidebar-left'), sidebarRight: $('sidebar-right'), toggleLeft: $('toggle-left'), toggleRight: $('toggle-right'),
        sliderTrack: $('slider-track'), sliderWrapper: $('slider-wrapper'), btnPrev: $('slide-prev'), btnNext: $('slide-next'),
        toggleViewMode: $('toggle-view-mode'), toggleBtnText: $('toggle-btn-text'),
        variantControls: $('office-variant-controls'), variantPrev: $('office-variant-prev'), variantNext: $('office-variant-next'), variantLabel: $('office-variant-label'),
        addAgentBtn: $('add-agent-btn'), agentList: $('agent-list'), agentCount: $('agent-count'), agentDetail: $('agent-detail'), viewHome: $('view-home'),
        navAgentCount: $('nav-agent-count'), navIntCount: $('nav-int-count'), navAlertCount: $('nav-alert-count'),
        ecoNoteText: $('eco-note-text'),
        integrationGrid: $('integration-grid'), analyticsInner: $('analytics-inner'),
        supervisionInner: $('supervision-inner'), auditInner: $('audit-inner'),
        topbarH: $('topbar-h'), topbarSub: $('topbar-sub'),
        liveChip: $('live-chip'), liveChipText: $('live-chip-text'),
        settingsBtn: $('settings-btn'), accountBtn: $('account-btn'), accountPopover: $('account-popover'),
        modalOverlay: $('modal-overlay'), modalBox: $('modal-box'), toastStack: $('toast-stack')
      };
      settings = loadSettings(); applyTheme();
      agents = loadAgents(); integrations = loadIntegrations();
      wire(); renderWorkspace(); renderCreatePanel();
      el.navIntCount.textContent = integrations.filter(i => i.connected).length;
      el.toggleViewMode.style.display = 'inline-flex';
      updateLiveChip(); updateEcoNote(); updateAlertBadge();
      // Try the Argus backend in the background; stays on demo data if unreachable.
      if (settings.useBackend !== false) syncBackend();
    }
  })();
  </script>
</body>
