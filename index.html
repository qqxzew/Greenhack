<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Argus — AI Agent Control Room</title>
  <meta name="description" content="Argus — orchestrate a fleet of AI agents while cutting wasted tokens, and the electricity behind them.">
  <link rel="icon" type="image/png" href="argus-logo.png">

  <!-- Premium Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- GSAP for the interactive 3D scene transitions -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    /* ============================================================
       THEME TOKENS
       ============================================================ */
    :root {
      --bg-main: #f7f8fa;
      --bg-panel: #ffffff;
      --bg-panel-2: #f1f3f7;
      --bg-elevated: #ffffff;
      --card: #ffffff;
      --canvas: #fbfcfe;

      --text: #1f2937;
      --text-muted: #6b7280;
      --text-strong: #0f172a;
      --text-faint: #9aa3b2;

      --border: rgba(15, 23, 42, 0.08);
      --border-strong: rgba(15, 23, 42, 0.14);

      --accent: #4f46e5;
      --accent-strong: #4338ca;
      --accent-soft: #eef2ff;
      --accent-contrast: #ffffff;

      --green: #10b981;
      --green-soft: #d1fae5;
      --amber: #f59e0b;
      --amber-soft: #fef3c7;
      --red: #ef4444;
      --red-soft: #fee2e2;
      --slate: #94a3b8;
      --slate-soft: #e2e8f0;

      --shadow-sm: 0 1px 2px rgba(15,23,42,.05), 0 1px 3px rgba(15,23,42,.04);
      --shadow-md: 0 8px 22px rgba(15,23,42,.07);
      --shadow-lg: 0 18px 48px rgba(15,23,42,.14);
      --shadow-pop: 0 24px 60px rgba(15,23,42,.22);

      --grid-line: rgba(15,23,42,0.025);

      --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

      --sidebar-width: 282px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --dur: 0.45s;

      color-scheme: light;
    }

    [data-theme="dark"] {
      --bg-main: #0a0c11;
      --bg-panel: #11141b;
      --bg-panel-2: #181c25;
      --bg-elevated: #161a23;
      --card: #161a23;
      --canvas: #0d1016;

      --text: #dfe3ea;
      --text-muted: #9aa3b2;
      --text-strong: #f8fafc;
      --text-faint: #6b7480;

      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.16);

      --accent: #6366f1;
      --accent-strong: #818cf8;
      --accent-soft: rgba(99, 102, 241, 0.16);
      --accent-contrast: #ffffff;

      --green: #34d399;
      --green-soft: rgba(52, 211, 153, 0.15);
      --amber: #fbbf24;
      --amber-soft: rgba(251, 191, 36, 0.15);
      --red: #f87171;
      --red-soft: rgba(248, 113, 113, 0.15);
      --slate: #94a3b8;
      --slate-soft: rgba(148, 163, 184, 0.16);

      --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
      --shadow-md: 0 8px 22px rgba(0,0,0,.45);
      --shadow-lg: 0 18px 48px rgba(0,0,0,.55);
      --shadow-pop: 0 24px 60px rgba(0,0,0,.6);

      --grid-line: rgba(255,255,255,0.03);

      color-scheme: dark;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    html, body { height: 100%; }
    body {
      font-family: var(--font); background-color: var(--bg-main); color: var(--text);
      height: 100vh; overflow: hidden; display: flex;
      transition: background-color .4s ease, color .4s ease;
    }
    button { font-family: inherit; }
    ::selection { background: var(--accent-soft); color: var(--accent-strong); }

    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; border: 3px solid transparent; background-clip: padding-box; }
    *::-webkit-scrollbar-thumb:hover { background: var(--text-faint); background-clip: padding-box; }

    /* ============================================================
       LAYOUT SHELL
       ============================================================ */
    #app-container { display: flex; width: 100%; height: 100%; position: relative; }

    .sidebar {
      width: var(--sidebar-width); height: 100%; background-color: var(--bg-panel);
      display: flex; flex-direction: column; position: relative; z-index: 10; flex-shrink: 0;
      transition: transform var(--dur) var(--ease), width var(--dur) var(--ease), background-color .4s ease;
    }
    #sidebar-left { border-right: 1px solid var(--border); }
    #sidebar-right { display: none !important; }
    #toggle-right { display: none !important; }
    #sidebar-left.collapsed { transform: translateX(-100%); }
    #sidebar-right.collapsed { transform: translateX(100%); }

    .sidebar-header { padding: 22px 22px 14px; display: flex; align-items: center; justify-content: space-between; }
    .brand-logo { display: flex; align-items: center; gap: 11px; font-weight: 700; font-size: 17px; letter-spacing: -0.02em; color: var(--text-strong); }
    .brand-mark-img {
      width: 36px; height: 36px; border-radius: 11px; flex-shrink: 0; object-fit: contain; padding: 3px;
      background: var(--bg-panel-2); border: 1px solid var(--border);
    }
    .brand-logo small { display: block; font-size: 11px; font-weight: 500; color: var(--text-faint); letter-spacing: 0; margin-top: 1px; }

    .sidebar-navigation { flex: 1; padding: 10px 12px; display: flex; flex-direction: column; gap: 3px; }
    .nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); padding: 14px 12px 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 10px;
      font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer; user-select: none;
      border: 1px solid transparent; width: 100%; background: transparent; text-align: left;
      transition: background-color .18s ease, color .18s ease, border-color .18s ease;
    }
    .nav-item:hover { background-color: var(--bg-panel-2); color: var(--text-strong); }
    .nav-item.active { background-color: var(--accent-soft); color: var(--accent-strong); border-color: color-mix(in srgb, var(--accent) 20%, transparent); font-weight: 600; }
    .nav-item svg { width: 18px; height: 18px; stroke-width: 1.9; flex-shrink: 0; }
    .nav-item .nav-count { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--text-faint); background: var(--bg-panel-2); padding: 2px 8px; border-radius: 99px; }
    .nav-item.active .nav-count { background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--accent-strong); }

    .sidebar-footer { padding: 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
    .footer-action {
      display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px;
      color: var(--text-muted); font-size: 14px; font-weight: 500; cursor: pointer; user-select: none;
      border: 1px solid transparent; background: transparent; width: 100%; text-align: left;
      transition: background-color .18s ease, color .15s ease;
    }
    .footer-action:hover { background-color: var(--bg-panel-2); color: var(--text-strong); }
    .footer-action svg { width: 19px; height: 19px; stroke-width: 1.8; flex-shrink: 0; }
    .avatar-placeholder {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #34d399, #4f46e5); color: #fff;
      display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
    }

    /* Ecology statement — the site's message, not a metric */
    .eco-note {
      margin: 8px 12px 4px; padding: 13px 14px; border-radius: 13px;
      background: var(--green-soft); border: 1px solid color-mix(in srgb, var(--green) 24%, transparent);
      display: flex; gap: 11px; align-items: flex-start;
    }
    .eco-note .leaf {
      width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      background: var(--green); color: #fff; box-shadow: 0 6px 14px -6px var(--green);
    }
    .eco-note .leaf svg { width: 17px; height: 17px; stroke-width: 2; }
    .eco-note strong { display: block; font-size: 12.5px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 3px;
      color: color-mix(in srgb, var(--green) 55%, var(--text-strong)); }
    .eco-note span { font-size: 11.5px; line-height: 1.5; color: var(--text-muted); }

    .toggle-trigger {
      position: absolute; top: 22px; width: 26px; height: 26px; border-radius: 8px;
      background-color: var(--bg-panel); border: 1px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100;
      box-shadow: var(--shadow-sm); color: var(--text-muted);
      transition: transform var(--dur) var(--ease), background-color .2s ease, color .2s ease;
    }
    .toggle-trigger:hover { background-color: var(--bg-elevated); color: var(--text-strong); box-shadow: var(--shadow-md); }
    #sidebar-left + .toggle-trigger-left { left: calc(var(--sidebar-width) - 13px); }
    #sidebar-right + .toggle-trigger-right { right: calc(var(--sidebar-width) - 13px); }
    #sidebar-left.collapsed + .toggle-trigger-left { transform: translateX(calc(-1 * var(--sidebar-width) + 24px)); }
    #sidebar-right.collapsed + .toggle-trigger-right { transform: translateX(calc(var(--sidebar-width) - 24px)); }
    .toggle-trigger svg { width: 15px; height: 15px; transition: transform var(--dur) var(--ease); }
    #sidebar-left.collapsed + .toggle-trigger-left svg,
    #sidebar-right.collapsed + .toggle-trigger-right svg { transform: rotate(180deg); }

    /* ============================================================
       MAIN AREA
       ============================================================ */
    main { flex: 1; height: 100%; background-color: var(--bg-main); position: relative; overflow: hidden; }

    .main-topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 60;
      padding: 18px 26px; display: flex; align-items: center; justify-content: space-between; gap: 16px; pointer-events: none;
    }
    .main-topbar > * { pointer-events: auto; }
    .topbar-title { display: flex; flex-direction: column; gap: 2px; }
    .topbar-title h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-strong); }
    .topbar-title p { font-size: 12.5px; color: var(--text-muted); font-weight: 500; }

    .pill-btn {
      padding: 9px 18px; border-radius: 100px; background-color: var(--bg-panel); border: 1px solid var(--border-strong);
      color: var(--text-muted); font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 9px;
      cursor: pointer; box-shadow: var(--shadow-sm);
      transition: background-color .2s ease, color .15s ease, transform .2s ease, box-shadow .2s ease;
    }
    .pill-btn:hover { background-color: var(--bg-elevated); color: var(--text-strong); box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .pill-btn svg { width: 16px; height: 16px; }

    .view { position: absolute; inset: 0; opacity: 0; visibility: hidden; transition: opacity .35s var(--ease); }
    .view.active { opacity: 1; visibility: visible; }

    /* HOME (scene canvas) */
    #view-home { display: flex; align-items: center; justify-content: center; }
    .grid-bg {
      position: absolute; inset: 0; background-size: 34px 34px; pointer-events: none; z-index: 1;
      background-image: linear-gradient(to right, var(--grid-line) 1px, transparent 1px), linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      -webkit-mask-image: radial-gradient(circle at center, #000 35%, transparent 78%);
      mask-image: radial-gradient(circle at center, #000 35%, transparent 78%);
    }

    .slider-wrapper { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2; }
    .slider-viewport { position: absolute; width: 560px; height: 560px; top: 50%; left: 50%; transform: translate(-50%, -52%); overflow: visible; }
    .slider-track { width: 100%; height: 100%; position: relative; }
    /* Polygon measured from actual PNG pixel boundaries (alpha-threshold scan, consensus of 5 images):
       top(50%,4%) → ur(91%,27%) → lr(91%,72%) → bot(51%,96%) → ll(9%,71%) → ul(9%,27%)       */
    .slider-slide { position: absolute; top: 0; left: 0; width: 560px; height: 560px; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; clip-path: polygon(50% 4%, 91% 27%, 91% 72%, 51% 96%, 9% 71%, 9% 27%); }
    .slider-slide.active { opacity: 1; pointer-events: auto; }
    .slider-slide img { width: 100%; height: 100%; object-fit: contain; user-select: none; pointer-events: none; -webkit-user-drag: none; filter: drop-shadow(0 24px 40px rgba(0,0,0,0.18)); }

    /* Hex boundary overlay — traces the same measured polygon; visible on each cell */
    .hex-outline { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; overflow: visible; }

    .agent-video {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; pointer-events: none; z-index: 1;
      clip-path: polygon(50% 4%, 91% 27%, 91% 72%, 51% 96%, 9% 71%, 9% 27%);
      opacity: 0; transition: opacity 0.18s ease;
    }
    .agent-video.playing { opacity: 1; }

    .slider-arrow {
      position: absolute; top: 50%; transform: translateY(-50%); width: 46px; height: 46px; border-radius: 50%;
      background-color: var(--bg-panel); border: 1px solid var(--border-strong); display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted); z-index: 50; box-shadow: var(--shadow-md);
      transition: background-color .2s ease, color .2s ease, transform .2s ease, box-shadow .2s ease, opacity .4s ease;
    }
    .slider-arrow:hover { background-color: var(--bg-elevated); color: var(--text-strong); box-shadow: var(--shadow-lg); }
    .slider-arrow:active { transform: translateY(-50%) scale(0.93); }
    .slider-arrow-left { left: 40px; }
    .slider-arrow-right { right: 40px; }
    .slider-arrow svg { width: 20px; height: 20px; stroke-width: 2; }

    .office-variant-controls {
      position: absolute; left: 50%; bottom: 30px; transform: translateX(-50%); display: flex; align-items: center; gap: 10px;
      z-index: 80; opacity: 0; pointer-events: none; transition: opacity .2s ease;
    }
    .office-variant-controls.visible { opacity: 1; pointer-events: auto; }
    .office-variant-arrow {
      width: 40px; height: 40px; border-radius: 999px; border: 1px solid var(--border-strong); background: var(--bg-panel); color: var(--text-muted);
      display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-md);
      transition: transform .2s ease, background-color .2s ease, color .2s ease;
    }
    .office-variant-arrow:hover { background: var(--bg-elevated); color: var(--text-strong); transform: translateY(-1px); }
    .office-variant-arrow svg { width: 17px; height: 17px; stroke-width: 2; }
    .office-variant-label {
      min-width: 140px; padding: 10px 14px; border-radius: 999px; border: 1px solid var(--border-strong); background: var(--bg-panel);
      color: var(--text-muted); font-size: 12px; font-weight: 600; text-align: center; box-shadow: var(--shadow-md); user-select: none;
    }

    .slider-wrapper.beehive-mode .slider-slide { opacity: 1; pointer-events: auto; cursor: pointer; }
    .slider-wrapper.beehive-mode .slider-slide img { filter: drop-shadow(0 10px 22px rgba(0,0,0,0.10)); transition: filter .2s ease; }
    .slider-wrapper.beehive-mode .slider-slide:hover img { filter: drop-shadow(0 16px 30px rgba(0,0,0,0.18)) brightness(1.05); }
    .slider-wrapper.beehive-mode .slider-arrow { opacity: 0; pointer-events: none; }

    .agent-detail {
      position: absolute; right: 0; top: 64px; bottom: 0; z-index: 55; width: 300px;
      background: color-mix(in srgb, var(--bg-panel) 93%, transparent);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-left: 1px solid var(--border); border-top: 1px solid var(--border);
      padding: 22px 20px; overflow-y: auto;
      transform: translateX(100%); opacity: 0; pointer-events: none;
      transition: transform 0.45s cubic-bezier(0.22,1,0.36,1), opacity 0.35s ease;
    }
    .agent-detail.visible { transform: translateX(0); opacity: 1; pointer-events: auto; }

    /* Agent panel pushes slider — slider-wrapper shrinks from the right when detail is open */
    .slider-wrapper { transition: right 0.45s cubic-bezier(0.22,1,0.36,1); }
    #view-home.detail-open .slider-wrapper { right: 300px; }
    .agent-detail-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .agent-detail-avatar { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0; box-shadow: var(--shadow-sm); }
    .agent-detail-id h3 { font-size: 16px; font-weight: 700; color: var(--text-strong); letter-spacing: -0.01em; }
    .agent-detail-id p { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .agent-detail-task { font-size: 12.5px; line-height: 1.5; color: var(--text-muted); background: var(--bg-panel-2); border-radius: 11px; padding: 10px 12px; margin-bottom: 14px; }
    .agent-detail-task b { color: var(--text); font-weight: 600; }
    .agent-detail-meta { display: flex; gap: 8px; margin-bottom: 14px; }
    .meta-tile { flex: 1; background: var(--bg-panel-2); border-radius: 11px; padding: 9px 10px; text-align: center; }
    .meta-tile .v { font-size: 15px; font-weight: 800; color: var(--text-strong); font-variant-numeric: tabular-nums; }
    .meta-tile .l { font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-faint); margin-top: 2px; }
    .agent-detail-actions { display: flex; gap: 8px; }
    .detail-btn {
      flex: 1; padding: 9px; border-radius: 10px; border: 1px solid var(--border-strong); background: var(--bg-elevated); color: var(--text);
      font-size: 12.5px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      transition: background-color .18s ease, transform .15s ease, border-color .18s ease;
    }
    .detail-btn:hover { background: var(--bg-panel-2); transform: translateY(-1px); }
    .detail-btn svg { width: 14px; height: 14px; stroke-width: 2; }
    .detail-btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-contrast); }
    .detail-btn.primary:hover { background: var(--accent-strong); }

    .view-scroll { height: 100%; overflow-y: auto; padding: 88px 36px 40px; box-sizing: border-box; }
    .view-inner { max-width: 980px; margin: 0 auto; }
    .section-eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-faint); margin-bottom: 14px; }

    .integration-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .integration-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px;
      display: flex; flex-direction: column; gap: 12px; box-shadow: var(--shadow-sm);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .integration-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border-strong); }
    .integration-top { display: flex; align-items: center; gap: 12px; }
    .integration-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .integration-name { font-size: 14.5px; font-weight: 700; color: var(--text-strong); }
    .integration-cat { font-size: 11.5px; color: var(--text-faint); font-weight: 500; }
    .integration-desc { font-size: 12.5px; line-height: 1.5; color: var(--text-muted); flex: 1; }
    .integration-foot { display: flex; align-items: center; justify-content: space-between; }
    .conn-state { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 600; color: var(--text-muted); }
    .conn-state .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--slate); }
    .conn-state.on { color: var(--green); }
    .conn-state.on .dot { background: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }
    .conn-btn {
      padding: 7px 14px; border-radius: 9px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border-strong);
      background: var(--bg-elevated); color: var(--text); transition: all .18s ease;
    }
    .conn-btn:hover { background: var(--bg-panel-2); }
    .conn-btn.on { background: var(--accent-soft); border-color: color-mix(in srgb, var(--accent) 25%, transparent); color: var(--accent-strong); }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow-sm); }
    .stat-card .l { font-size: 12px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 7px; }
    .stat-card .l svg { width: 15px; height: 15px; stroke-width: 2; }
    .stat-card .v { font-size: 30px; font-weight: 800; color: var(--text-strong); letter-spacing: -0.02em; margin-top: 8px; font-variant-numeric: tabular-nums; }
    .stat-card .s { font-size: 11.5px; color: var(--text-faint); margin-top: 4px; font-weight: 500; }

    .panel-grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 760px){ .panel-grid { grid-template-columns: 1fr; } }
    .data-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: var(--shadow-sm); }
    .data-panel h3 { font-size: 13.5px; font-weight: 700; color: var(--text-strong); margin-bottom: 18px; }

    .donut-wrap { display: flex; align-items: center; gap: 22px; }
    .donut { width: 128px; height: 128px; border-radius: 50%; flex-shrink: 0; position: relative; }
    .donut::after { content: ""; position: absolute; inset: 22px; border-radius: 50%; background: var(--card); }
    .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; }
    .donut-center .v { font-size: 24px; font-weight: 800; color: var(--text-strong); }
    .donut-center .l { font-size: 10px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; }
    .donut-legend { display: flex; flex-direction: column; gap: 9px; }
    .legend-row { display: flex; align-items: center; gap: 9px; font-size: 12.5px; font-weight: 500; color: var(--text-muted); }
    .legend-row .sw { width: 11px; height: 11px; border-radius: 4px; flex-shrink: 0; }
    .legend-row b { color: var(--text-strong); font-weight: 700; margin-left: auto; font-variant-numeric: tabular-nums; }

    .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 13px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-label { width: 92px; flex-shrink: 0; font-size: 12.5px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 9px; background: var(--bg-panel-2); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width .7s var(--ease); }
    .bar-val { width: 38px; text-align: right; font-size: 12px; font-weight: 700; color: var(--text-muted); font-variant-numeric: tabular-nums; }

    .roster { width: 100%; border-collapse: collapse; }
    .roster th { text-align: left; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); padding: 0 10px 12px; }
    .roster td { padding: 11px 10px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text); }
    .roster tr td:first-child { font-weight: 600; color: var(--text-strong); }

    /* View toolbar (audit filters / export) */
    .view-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .view-toolbar select { padding: 9px 12px; border-radius: 10px; border: 1px solid var(--border-strong); background: var(--bg-panel); color: var(--text); font-size: 13px; font-family: inherit; cursor: pointer; }
    .view-toolbar .spacer { flex: 1; }
    .ghost-btn { padding: 9px 14px; border-radius: 10px; border: 1px solid var(--border-strong); background: var(--bg-panel); color: var(--text); font-size: 12.5px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: background-color .18s ease; }
    .ghost-btn:hover { background: var(--bg-panel-2); }
    .ghost-btn svg { width: 15px; height: 15px; stroke-width: 2; }

    /* Audit timeline */
    .audit-head, .audit-item { display: grid; grid-template-columns: 76px 1.4fr 1fr 96px 72px 78px; gap: 12px; align-items: center; }
    .audit-head { padding: 0 18px 10px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); }
    .audit-head .r { text-align: right; }
    .audit-list { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow-sm); overflow: hidden; }
    .audit-item { padding: 11px 18px; border-top: 1px solid var(--border); font-size: 12.5px; }
    .audit-item:first-child { border-top: none; }
    .audit-item.flagged-row { background: color-mix(in srgb, var(--red-soft) 45%, transparent); }
    .audit-time { color: var(--text-faint); font-family: var(--mono); font-size: 11px; }
    .audit-agent { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .audit-agent .av { width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 11px; }
    .audit-agent strong { font-size: 12.5px; color: var(--text-strong); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .audit-type { color: var(--text-muted); }
    .audit-num { text-align: right; font-variant-numeric: tabular-nums; color: var(--text); }
    .audit-flags { display: flex; gap: 5px; justify-content: flex-end; align-items: center; }
    .flag-pill { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; padding: 2px 6px; border-radius: 5px; }
    .flag-pill.anomaly { background: var(--red-soft); color: var(--red); }
    .flag-pill.stuck { background: var(--amber-soft); color: var(--amber); }

    /* Supervision */
    .sup-section-title { font-size: 13px; font-weight: 700; color: var(--text-strong); margin: 22px 0 12px; }
    .sup-section-title:first-child { margin-top: 0; }
    .sup-alert { display: flex; align-items: center; gap: 13px; padding: 14px 16px; border-radius: 14px; margin-bottom: 10px; border: 1px solid color-mix(in srgb, var(--red) 25%, transparent); background: var(--red-soft); }
    .sup-alert.warn { border-color: color-mix(in srgb, var(--amber) 28%, transparent); background: var(--amber-soft); }
    .sup-alert .av { width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 14px; }
    .sup-alert-body { flex: 1; min-width: 0; }
    .sup-alert-body strong { font-size: 14px; color: var(--text-strong); }
    .sup-alert-body p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .sup-alert-actions { display: flex; gap: 7px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
    .sup-btn { padding: 8px 12px; border-radius: 9px; border: 1px solid var(--border-strong); background: var(--bg-elevated); color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; transition: background-color .18s ease, filter .18s ease; }
    .sup-btn:hover { background: var(--bg-panel-2); }
    .sup-btn.kill { background: var(--red); border-color: var(--red); color: #fff; }
    .sup-btn.kill:hover { filter: brightness(.93); }
    .sup-btn.resume { background: var(--green); border-color: var(--green); color: #fff; }
    .sup-btn.resume:hover { filter: brightness(.95); }
    .all-clear { text-align: center; padding: 32px 16px; border-radius: 14px; background: var(--green-soft); border: 1px solid color-mix(in srgb, var(--green) 22%, transparent); }
    .all-clear svg { width: 32px; height: 32px; color: var(--green); margin-bottom: 10px; stroke-width: 2; }
    .all-clear p { font-size: 13.5px; font-weight: 600; color: color-mix(in srgb, var(--green) 55%, var(--text-strong)); }
    .ctrl-list { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow-sm); overflow: hidden; }
    .ctrl-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-top: 1px solid var(--border); }
    .ctrl-row:first-child { border-top: none; }
    .ctrl-row .av { width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 13px; }
    .ctrl-row-body { flex: 1; min-width: 0; }
    .ctrl-row-body strong { font-size: 13px; color: var(--text-strong); display: block; }
    .ctrl-row-body span { font-size: 11.5px; color: var(--text-muted); }
    .ctrl-row-actions { display: flex; gap: 7px; flex-shrink: 0; }

    .status-killed { background: var(--red-soft); color: var(--red); }
    .status-killed .dot { background: var(--red); }
    .nav-item .nav-count.alert { background: var(--red); color: #fff; }

    /* RIGHT PANEL — CREATE AGENT */
    .panel-section-title { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); }
    .agent-count { font-size: 13px; color: var(--text-muted); font-weight: 500; margin-top: 3px; display: none; }
    /* hidden — keep id alive for JS nav-count update */
    .agent-add-btn { display: none; }
    .agent-list { display: none; }

    .create-agent-panel { padding: 22px 18px; display: flex; flex-direction: column; gap: 14px; height: 100%; overflow-y: auto; }
    .cap-header { margin-bottom: 4px; }
    .cap-header h3 { font-size: 16px; font-weight: 800; color: var(--text-strong); letter-spacing: -0.02em; margin-bottom: 2px; }
    .cap-header p { font-size: 12px; color: var(--text-muted); }
    .cap-field { display: flex; flex-direction: column; gap: 6px; }
    .cap-field label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); }
    .cap-field input, .cap-field textarea {
      width: 100%; padding: 10px 12px; border-radius: 10px; border: 1.5px solid var(--border-strong);
      background: var(--bg-panel-2); color: var(--text); font-size: 13px; font-family: var(--font);
      resize: none; outline: none; box-sizing: border-box; transition: border-color .2s ease;
    }
    .cap-field input:focus, .cap-field textarea:focus { border-color: var(--accent); }
    .cap-skins { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .cap-skin {
      aspect-ratio: 1; border-radius: 10px; overflow: hidden; cursor: pointer;
      border: 2px solid var(--border); transition: border-color .18s ease, transform .18s ease;
    }
    .cap-skin:hover { transform: scale(1.05); }
    .cap-skin.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
    .cap-skin img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; display: block; }
    .cap-skin-label { font-size: 9px; font-weight: 700; text-align: center; color: var(--text-faint); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.03em; }
    .cap-savings {
      display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 12px;
      background: linear-gradient(135deg, color-mix(in srgb, #10b981 12%, var(--bg-panel)), color-mix(in srgb, #0891b2 8%, var(--bg-panel)));
      border: 1px solid color-mix(in srgb, #10b981 22%, transparent);
      transition: border-color .3s ease, background .3s ease;
    }
    .cap-savings.ai-predicted {
      background: linear-gradient(135deg, color-mix(in srgb, #10b981 18%, var(--bg-panel)), color-mix(in srgb, #6366f1 10%, var(--bg-panel)));
      border-color: color-mix(in srgb, #6366f1 35%, transparent);
    }
    .cap-savings-icon { font-size: 18px; line-height: 1; flex-shrink: 0; }
    .cap-savings-text { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
    .cap-savings-text b { color: var(--green); }
    .cap-savings-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 6px; border-radius: 5px; background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--accent-strong); margin-left: 4px; vertical-align: middle; }
    .cap-result {
      background: var(--bg-panel-2); border-radius: 12px; padding: 12px; font-size: 12px;
      color: var(--text-muted); line-height: 1.6; border: 1px solid var(--border); display: none;
    }
    .cap-result.visible { display: block; }
    .cap-result strong { color: var(--text); font-weight: 700; display: block; margin-bottom: 4px; }
    .cap-btn-generate {
      width: 100%; padding: 11px; border-radius: 11px; border: 1.5px solid var(--accent);
      background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background .2s ease, transform .15s ease, opacity .2s ease;
    }
    .cap-btn-generate:hover:not(:disabled) { background: var(--accent-strong); transform: translateY(-1px); }
    .cap-btn-generate:disabled { opacity: 0.6; cursor: default; transform: none; }
    .cap-btn-add {
      width: 100%; padding: 10px; border-radius: 11px; border: 1.5px solid var(--border-strong);
      background: var(--bg-elevated); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background .2s ease, transform .15s ease;
    }
    .cap-btn-add:hover { background: var(--bg-panel-2); transform: translateY(-1px); }

    .agent-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 4px; flex: 1; }
    .agent-item {
      position: relative; display: flex; align-items: center; gap: 12px; padding: 13px; border-radius: 14px;
      border: 1px solid var(--border); background: var(--card); box-shadow: var(--shadow-sm); cursor: pointer;
      transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease, background-color .2s ease;
    }
    .agent-item:hover { border-color: var(--border-strong); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .agent-item.active { border-color: color-mix(in srgb, var(--accent) 45%, transparent); box-shadow: 0 10px 24px -10px var(--accent); background: color-mix(in srgb, var(--accent-soft) 60%, var(--card)); }
    .agent-avatar { width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: #fff; box-shadow: var(--shadow-sm); }
    .agent-item-body { flex: 1; min-width: 0; }
    .agent-item-name { display: flex; align-items: center; gap: 8px; }
    .agent-item-name strong { font-size: 13.5px; color: var(--text-strong); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-item-role { font-size: 11.5px; color: var(--text-muted); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .agent-item-sub { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
    .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-active { background: var(--green-soft); color: var(--green); }
    .status-active .dot { background: var(--green); animation: pulse 2s infinite; }
    .status-idle { background: var(--slate-soft); color: var(--slate); }
    .status-idle .dot { background: var(--slate); }
    .status-paused { background: var(--amber-soft); color: var(--amber); }
    .status-paused .dot { background: var(--amber); }
    .status-degraded { background: var(--amber-soft); color: var(--amber); }
    .status-degraded .dot { background: var(--amber); }
    .status-flagged { background: var(--red-soft); color: var(--red); }
    .status-flagged .dot { background: var(--red); animation: pulse-red 2s infinite; }
    .model-chip { font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--text-faint); background: var(--bg-panel-2); padding: 2px 7px; border-radius: 6px; }

    /* Live/Demo connection chip */
    .topbar-actions { display: flex; align-items: center; gap: 10px; }
    .live-chip {
      display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 100px;
      border: 1px solid var(--border-strong); background: var(--bg-panel); font-size: 12.5px; font-weight: 600;
      color: var(--text-muted); cursor: pointer; box-shadow: var(--shadow-sm);
      transition: background-color .2s ease, color .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .live-chip:hover { background: var(--bg-elevated); color: var(--text-strong); box-shadow: var(--shadow-md); }
    .live-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--slate); }
    .live-chip.live { color: var(--green); border-color: color-mix(in srgb, var(--green) 35%, transparent); }
    .live-chip.live .dot { background: var(--green); box-shadow: 0 0 0 3px var(--green-soft); animation: pulse 2s infinite; }
    .live-chip.syncing .dot { background: var(--amber); animation: none; }

    @keyframes pulse-red { 0%,100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--red) 60%, transparent); } 70% { box-shadow: 0 0 0 5px transparent; } }

    /* Governance bits in the agent detail */
    .flag-banner { display: flex; align-items: center; gap: 9px; padding: 9px 11px; border-radius: 11px; font-size: 11.5px; font-weight: 600; margin-bottom: 12px; }
    .flag-banner svg { width: 15px; height: 15px; stroke-width: 2.2; flex-shrink: 0; }
    .flag-banner.flagged { background: var(--red-soft); color: var(--red); }
    .flag-banner.degraded { background: var(--amber-soft); color: var(--amber); }
    .kind-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 6px; }
    .kind-badge.productive { background: var(--green-soft); color: var(--green); }
    .kind-badge.abuser { background: var(--red-soft); color: var(--red); }
    .util-bar { height: 6px; border-radius: 99px; background: var(--bg-panel-2); overflow: hidden; margin-top: 5px; }
    .util-bar > span { display: block; height: 100%; border-radius: 99px; }

    .agent-item-tools { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; opacity: 0; transform: translateX(4px); transition: opacity .18s ease, transform .18s ease; }
    .agent-item:hover .agent-item-tools, .agent-item.active .agent-item-tools { opacity: 1; transform: translateX(0); }
    .agent-action {
      width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px;
      border: 1px solid var(--border-strong); background: var(--bg-elevated); color: var(--text-muted); cursor: pointer;
      transition: background-color .18s ease, color .18s ease, border-color .18s ease;
    }
    .agent-action svg { width: 13px; height: 13px; stroke-width: 2; }
    .agent-action:hover { background: var(--bg-panel-2); color: var(--text-strong); }
    .agent-action.delete:hover { background: var(--red-soft); color: var(--red); border-color: color-mix(in srgb, var(--red) 30%, transparent); }
    .agent-action:disabled { opacity: 0.4; cursor: not-allowed; }

    .agent-empty { text-align: center; padding: 40px 16px; color: var(--text-muted); }
    .agent-empty svg { width: 38px; height: 38px; color: var(--text-faint); margin-bottom: 12px; stroke-width: 1.5; }
    .agent-empty p { font-size: 13px; line-height: 1.5; }

    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--green) 60%, transparent); } 70% { box-shadow: 0 0 0 5px transparent; } }

    /* MODAL + DIALOG + TOAST + POPOVER */
    .overlay { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px;
      background: rgba(15,23,42,0.42); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); opacity: 0; visibility: hidden; transition: opacity .25s ease; }
    [data-theme="dark"] .overlay { background: rgba(0,0,0,0.6); }
    .overlay.open { opacity: 1; visibility: visible; }
    .modal {
      width: 100%; max-width: 480px; max-height: calc(100vh - 48px); overflow-y: auto;
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow-pop);
      transform: translateY(14px) scale(0.98); transition: transform .3s var(--ease); padding: 24px;
    }
    .overlay.open .modal { transform: translateY(0) scale(1); }
    .modal-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
    .modal-head h2 { font-size: 19px; font-weight: 700; color: var(--text-strong); letter-spacing: -0.02em; }
    .modal-head p { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .modal-close { width: 32px; height: 32px; border-radius: 9px; border: 1px solid var(--border); background: var(--bg-panel); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .18s ease; flex-shrink: 0; }
    .modal-close:hover { background: var(--bg-panel-2); color: var(--text-strong); }
    .modal-close svg { width: 16px; height: 16px; stroke-width: 2; }

    .field { margin-bottom: 16px; }
    .field > label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .field input[type="text"], .field select {
      width: 100%; padding: 11px 13px; border-radius: 11px; border: 1px solid var(--border-strong); background: var(--bg-panel);
      color: var(--text); font-size: 14px; font-family: inherit; transition: border-color .18s ease, box-shadow .18s ease;
    }
    .field input[type="text"]:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .field-row { display: flex; gap: 12px; }
    .field-row .field { flex: 1; }

    .archetype-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(86px, 1fr)); gap: 9px; }
    .archetype-chip {
      border: 1px solid var(--border-strong); background: var(--bg-panel); border-radius: 13px; padding: 10px 6px 9px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 7px; transition: all .18s ease; text-align: center;
    }
    .archetype-chip:hover { border-color: var(--accent); background: var(--bg-panel-2); }
    .archetype-chip.selected { border-color: var(--accent); background: var(--accent-soft); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent); }
    .archetype-thumb { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: #fff; }
    .archetype-chip span { font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.2; }

    .modal-foot { display: flex; gap: 10px; margin-top: 22px; }
    .btn {
      flex: 1; padding: 12px; border-radius: 11px; font-size: 13.5px; font-weight: 600; cursor: pointer; border: 1px solid var(--border-strong);
      background: var(--bg-panel); color: var(--text); transition: all .18s ease;
    }
    .btn:hover { background: var(--bg-panel-2); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-contrast); box-shadow: 0 8px 18px -8px var(--accent); }
    .btn.primary:hover { background: var(--accent-strong); }
    .btn.danger { background: var(--red); border-color: var(--red); color: #fff; }
    .btn.danger:hover { filter: brightness(0.94); }

    .modal.confirm { max-width: 400px; }
    .confirm-icon { width: 46px; height: 46px; border-radius: 13px; background: var(--red-soft); color: var(--red); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .confirm-icon svg { width: 23px; height: 23px; stroke-width: 2; }

    .setting-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .setting-row:last-of-type { border-bottom: none; }
    .setting-row .info strong { display: block; font-size: 13.5px; font-weight: 600; color: var(--text-strong); }
    .setting-row .info span { font-size: 12px; color: var(--text-muted); }
    .switch { width: 44px; height: 25px; border-radius: 99px; background: var(--slate-soft); border: none; position: relative; cursor: pointer; flex-shrink: 0; transition: background .2s ease; }
    .switch::after { content: ""; position: absolute; top: 3px; left: 3px; width: 19px; height: 19px; border-radius: 50%; background: #fff; box-shadow: var(--shadow-sm); transition: transform .2s var(--ease); }
    .switch.on { background: var(--accent); }
    .switch.on::after { transform: translateX(19px); }

    #toast-stack { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 10px; align-items: center; pointer-events: none; }
    .toast {
      display: flex; align-items: center; gap: 11px; padding: 12px 18px; border-radius: 13px; background: var(--text-strong); color: var(--bg-panel);
      font-size: 13.5px; font-weight: 600; box-shadow: var(--shadow-pop); pointer-events: auto; max-width: 90vw;
      transform: translateY(16px); opacity: 0; transition: transform .35s var(--ease), opacity .35s var(--ease);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast .ic { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .toast .ic svg { width: 12px; height: 12px; stroke-width: 3; }
    .toast.success .ic { background: var(--green); color: #fff; }
    .toast.info .ic { background: var(--accent); color: #fff; }
    .toast.warn .ic { background: var(--amber); color: #fff; }

    .popover {
      position: fixed; z-index: 1500; width: 240px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 14px;
      box-shadow: var(--shadow-pop); padding: 8px; opacity: 0; visibility: hidden; transform: translateY(6px); transition: opacity .2s ease, transform .2s ease;
    }
    .popover.open { opacity: 1; visibility: visible; transform: translateY(0); }
    .popover-head { display: flex; align-items: center; gap: 11px; padding: 10px; }
    .popover-head .avatar-placeholder { width: 36px; height: 36px; font-size: 13px; }
    .popover-head strong { font-size: 13.5px; color: var(--text-strong); display: block; }
    .popover-head span { font-size: 11.5px; color: var(--text-muted); }
    .popover-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 9px; font-size: 13px; color: var(--text); cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; transition: background .15s ease; }
    .popover-item:hover { background: var(--bg-panel-2); }
    .popover-item svg { width: 15px; height: 15px; stroke-width: 1.9; color: var(--text-muted); }
    .popover-divider { height: 1px; background: var(--border); margin: 6px 4px; }

    @media (max-width: 900px) {
      .sidebar { position: absolute; top: 0; bottom: 0; box-shadow: var(--shadow-lg); }
      #sidebar-left { left: 0; }
      #sidebar-right { right: 0; }
      .agent-detail { width: 260px; }
      #view-home.detail-open .slider-wrapper { right: 260px; }
    }
  </style>
</head>

    function whToCo2g(wh) { return (wh / 1000) * ENERGY.co2gPerKwh; }
    function fmtEnergy(wh) { return wh >= 1000 ? `${(wh/1000).toFixed(2)} kWh` : `${wh.toFixed(1)} Wh`; }

    // Backend "character" → frontend archetype (1:1 with ARCHETYPES keys).
    const CHAR_TO_ARCH = { guardian: 'guardian', alchemist: 'alchemist', robot: 'robot', punk: 'punk', mage: 'mage' };

    const DEFAULT_INTEGRATIONS = [
      { key: 'github',   name: 'GitHub',       cat: 'Source control', color: '#1f2328', mono: 'GH', desc: 'Let agents open PRs, review diffs and read issues.', connected: true },

      { key: 'notion',   name: 'Notion',       cat: 'Docs',           color: '#111111', mono: 'NO', desc: 'Read specs and write generated docs back to pages.', connected: false },
      { key: 'gdrive',   name: 'Google Drive', cat: 'Storage',        color: '#1a73e8', mono: 'GD', desc: 'Mount documents and spreadsheets as agent context.', connected: false },
      { key: 'postgres', name: 'Postgres',     cat: 'Database',       color: '#336791', mono: 'PG', desc: 'Give agents read access to query production data.', connected: true },
      { key: 'webhooks', name: 'Webhooks',     cat: 'Automation',     color: '#0891b2', mono: 'WH', desc: 'Trigger agent runs from any external event.', connected: false },
      { key: 'anthropic',name: 'Anthropic API',cat: 'Model provider', color: '#d97757', mono: 'AN', desc: 'The inference backend powering every agent.', connected: true }
    ];

    const LS = { agents: 'argus-agents-v2', integrations: 'argus-integrations-v1', settings: 'argus-settings-v1' };
    const DEFAULT_SETTINGS = { theme: 'light', apiBase: 'http://localhost:8000', useBackend: true };

    /* ============================================================ STATE ============================================================ */
    let agents = [], integrations = [], settings = { ...DEFAULT_SETTINGS };
    let currentIndex = 0, isBeehive = false, currentView = 'home', slides = [];
    let dataSource = 'demo', orgState = null;   // 'demo' | 'live'
    let auditEvents = [];
    const acknowledged = new Set();
    const beehiveScale = 0.39, ratioX = 0.40, ratioY = 0.62, boxSize = 560;
    let el = {};
    function isLive() { return dataSource === 'live'; }

    /* ============================================================ UTIL ============================================================ */
    function $(id) { return document.getElementById(id); }
    function esc(v) { return String(v).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
    function uid() { return 'agent-' + Date.now().toString(36) + '-' + Math.floor(Math.random()*1e4).toString(36); }
    function archetype(key) { return ARCHETYPES.find(a => a.key === key) || ARCHETYPES[0]; }
    function modelLabel(id) {
      const m = MODELS.find(x => x.id === id);
      if (m) return m.label;
      if (!id) return '—';
      const mt = /^claude-(opus|sonnet|haiku)-(\d+)-(\d+)/.exec(id);
      if (mt) return mt[1][0].toUpperCase() + mt[1].slice(1) + ' ' + mt[2] + '.' + mt[3];
      return id;
    }
    function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }

    function seededMetrics(seed) {
      let h = 0; for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
      return { tasks: 40 + (h % 460), success: Number((90 + ((h >> 4) % 100) / 10).toFixed(1)), uptime: Number((1 + ((h >> 8) % 280) / 10).toFixed(1)) };
    }

    function getAgentImage(agent) {
      const scene = SCENES[agent.sceneKey] || SCENES.office;
      if (!scene.variants) return scene.baseImage;
      const i = ((agent.variantIndex || 0) % scene.variants.length + scene.variants.length) % scene.variants.length;
      agent.variantIndex = i;
      return scene.variants[i];
    }

    /* ============================================================ PERSISTENCE ============================================================ */
    function defaultAgents() {
      return ARCHETYPES.map((a, i) => ({
        id: 'agent-' + a.key, name: a.name, archetypeKey: a.key, sceneKey: a.sceneKey, variantIndex: 0,
        role: a.role, model: MODELS[i % MODELS.length].id,
        status: i === 1 ? 'idle' : (i === 3 ? 'paused' : 'active'), task: a.task, metrics: seededMetrics(a.key)
      }));
    }
    function loadAgents() {
      try {
        const raw = localStorage.getItem(LS.agents);
        if (!raw) return defaultAgents();
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed) || parsed.length === 0) return defaultAgents();
        return parsed.map(a => {
          const arch = archetype(a.archetypeKey || 'guardian');
          return {
            id: a.id || uid(),
            name: (typeof a.name === 'string' && a.name.trim()) ? a.name.trim() : arch.name,
            archetypeKey: arch.key,
            sceneKey: SCENES[a.sceneKey] ? a.sceneKey : arch.sceneKey,
            variantIndex: Number.isInteger(a.variantIndex) ? a.variantIndex : 0,
            role: (typeof a.role === 'string' && a.role.trim()) ? a.role.trim() : arch.role,
            model: MODELS.some(m => m.id === a.model) ? a.model : MODELS[0].id,
            status: STATUSES[a.status] ? a.status : 'active',
            task: (typeof a.task === 'string' && a.task.trim()) ? a.task : arch.task,
            metrics: (a.metrics && typeof a.metrics.tasks === 'number') ? a.metrics : seededMetrics(a.id || arch.key)
          };
        });
      } catch { return defaultAgents(); }
    }
    function saveAgents() { try { localStorage.setItem(LS.agents, JSON.stringify(agents)); } catch {} }

    function loadIntegrations() {
      try {
        const saved = JSON.parse(localStorage.getItem(LS.integrations) || '{}');
        return DEFAULT_INTEGRATIONS.map(d => ({ ...d, connected: typeof saved[d.key] === 'boolean' ? saved[d.key] : d.connected }));
      } catch { return DEFAULT_INTEGRATIONS.map(d => ({ ...d })); }
    }
    function saveIntegrations() {
      try { const map = {}; integrations.forEach(i => map[i.key] = i.connected); localStorage.setItem(LS.integrations, JSON.stringify(map)); } catch {}
    }
    function loadSettings() { try { return Object.assign({ ...DEFAULT_SETTINGS }, JSON.parse(localStorage.getItem(LS.settings) || '{}')); } catch { return { ...DEFAULT_SETTINGS }; } }
    function saveSettings() { try { localStorage.setItem(LS.settings, JSON.stringify(settings)); } catch {} }

    /* ============================================================ ARGUS BACKEND CONNECTOR ============================================================ */
    function apiBase() { return (settings.apiBase || DEFAULT_SETTINGS.apiBase).replace(/\/+$/, ''); }

    // Map a backend agent (from GET /v1/agents) to a frontend agent object.
    function mapLiveAgent(a) {
      const archKey = CHAR_TO_ARCH[a.character] || 'guardian';
      const arch = archetype(archKey);
      return {
        id: a.id,
        name: a.name || arch.name,
        archetypeKey: archKey,
        sceneKey: arch.sceneKey,
        variantIndex: 0,
        role: a.role || arch.role,
        model: a.model || 'claude-haiku-4-5',
        status: STATUSES[a.status] ? a.status : 'active',
        task: a.persona || arch.task,
        live: {
          calls: a.calls || 0,
          tokens: a.tokens || 0,
          cost: a.cost || 0,
          quality: a.avg_quality,
          util: a.utilization || 0,
          action: a.budget_action || 'ok',
          budget: a.budget || 0,
          used: a.used || 0,
          anomaly: !!a.anomaly,
          stuck: !!a.stuck,
          kind: a.kind || 'productive',
          taskTypes: a.task_types || {}
        },
        metrics: null
      };
    }

    function updateLiveChip(stateOverride) {
      if (!el.liveChip) return;
      const s = stateOverride || (isLive() ? 'live' : 'demo');
      el.liveChip.classList.toggle('live', s === 'live');
      el.liveChip.classList.toggle('syncing', s === 'syncing');
      el.liveChipText.textContent = s === 'live' ? 'Live · Argus' : s === 'syncing' ? 'Syncing…' : 'Demo data';
    }

    async function syncBackend({ manual = false } = {}) {
      updateLiveChip('syncing');
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 4500);
        const res = await fetch(apiBase() + '/v1/agents', { signal: ctrl.signal, headers: { 'Accept': 'application/json' } });
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data || !Array.isArray(data.agents) || data.agents.length === 0) throw new Error('empty roster');

        agents = data.agents.map(mapLiveAgent);
        orgState = data.org || null;
        dataSource = 'live';
        currentIndex = clamp(currentIndex, 0, agents.length - 1);
        updateLiveChip(); updateEcoNote(); updateAlertBadge(); renderCreatePanel();
        renderWorkspace();
        if (currentView === 'integrations') renderIntegrations();
        if (currentView === 'analytics') renderAnalytics();
        if (currentView === 'supervision') renderSupervision();
        if (currentView === 'audit') { await fetchAudit(); renderAudit(); }
        if (manual) toast(`Synced ${agents.length} agents from Argus`, 'success');
        return true;
      } catch (err) {
        if (!isLive()) { dataSource = 'demo'; }
        updateLiveChip();
        if (manual) toast('Argus backend unreachable — staying in demo', 'warn');
        return false;
      }
    }

    function useDemoData() {
      dataSource = 'demo';
      orgState = null;
      agents = loadAgents();
      currentIndex = 0; isBeehive = false;
      updateLiveChip(); updateEcoNote(); updateAlertBadge();
      renderWorkspace();
      if (currentView === 'analytics') renderAnalytics();
      if (currentView === 'supervision') renderSupervision();
      if (currentView === 'audit') fetchAudit().then(() => { if (currentView === 'audit') renderAudit(); });
    }

    /* ---- Energy fact (eco statement) ---- */
    function updateEcoNote() {
      if (!el.ecoNoteText) return;
      const saved = (isLive() && orgState && orgState.tokens_saved) ? orgState.tokens_saved : 0;
      if (saved > 0) {
        const wh = tokensToWh(saved);
        el.ecoNoteText.innerHTML = `Argus skipped redundant work this session — about <b style="color:var(--text)">${esc(fmtEnergy(wh))}</b> of compute and ${esc(fmtCo2(whToCo2g(wh)))} of CO₂ never spent.`;
      } else {
        el.ecoNoteText.textContent = 'Every token Argus saves is energy never burned — fewer GPU-hours, less power drawn, lower CO₂.';
      }
    }

    /* ---- Supervision alerts badge ---- */
    function updateAlertBadge() {
      if (!el.navAlertCount) return;
      const n = agents.filter(a => a.status === 'flagged' || a.status === 'killed').length;
      el.navAlertCount.textContent = n;
      el.navAlertCount.style.display = n > 0 ? 'inline-block' : 'none';
    }

    /* ---- Human-in-the-loop control: pause / resume / kill ---- */
    async function controlAgent(id, action) {
      const agent = agents.find(x => x.id === id);
      const verb = action === 'resume' ? 'reactivated' : action === 'kill' ? 'killed' : 'paused';
      if (isLive()) {
        try {
          const res = await fetch(apiBase() + '/v1/agents/' + encodeURIComponent(id) + '/control', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action })
          });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          if (action === 'resume') acknowledged.delete(id);
          await syncBackend();
          renderSupervision();
          toast(`${agent ? agent.name : 'Agent'} ${verb}`, action === 'resume' ? 'success' : 'warn');
        } catch { toast('Control failed — backend unreachable', 'warn'); }
      } else {
        if (!agent) return;
        agent.status = action === 'resume' ? 'active' : action === 'kill' ? 'killed' : 'paused';
        if (action === 'resume') acknowledged.delete(id);
        saveAgents(); renderWorkspace(); renderSupervision(); updateAlertBadge();
        toast(`${agent.name} ${verb}`, action === 'resume' ? 'success' : 'warn');
      }
    }

    /* ---- Audit trail ---- */
    let auditFilter = 'all';
    async function fetchAudit() {
      if (isLive()) {
        try {
          const res = await fetch(apiBase() + '/v1/audit?limit=200', { headers: { 'Accept': 'application/json' } });
          if (!res.ok) throw new Error();
          auditEvents = (await res.json()).events || [];
        } catch { auditEvents = []; }
      } else {
        auditEvents = synthAudit();
      }
    }
    function synthAudit() {
      const types = ['qa', 'summarize', 'analysis', 'code_review', 'translation', 'generation'];
      const now = Date.now() / 1000, rows = [];
      if (!agents.length) return rows;
      for (let i = 0; i < 26; i++) {
        const ag = agents[i % agents.length];
        const tok = 400 + ((i * 137) % 1700);
        rows.push({ ts: now - i * 53, agent_id: ag.id, agent_name: ag.name, task_type: types[i % types.length],
          model: ag.model, tokens: tok, cost: +((tok / 1000) * 0.004).toFixed(4), quality: 0.8 + (i % 15) / 100, anomaly: false, stuck: false });
      }
      return rows;
    }
    function relTime(ts) {
      if (!ts) return '—';
      const s = Math.max(0, Date.now() / 1000 - ts);
      if (s < 60) return Math.floor(s) + 's ago';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return Math.floor(s / 86400) + 'd ago';
    }
    function exportAudit() {
      try {
        const blob = new Blob([JSON.stringify(auditEvents, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'argus-audit.json'; a.click();
        URL.revokeObjectURL(url);
        toast('Audit exported', 'success');
      } catch { toast('Export failed', 'warn'); }
    }

    function renderAudit() {
      const rows = auditEvents.filter(e => auditFilter === 'all' || e.agent_id === auditFilter);
      el.auditInner.innerHTML = `
        <div class="section-eyebrow">${isLive() ? 'Live · ' : ''}Audit trail — every governed call, ${auditEvents.length} events</div>
        <div class="view-toolbar">
          <select id="audit-filter">
            <option value="all">All agents</option>
            ${agents.map(a => `<option value="${a.id}"${a.id === auditFilter ? ' selected' : ''}>${esc(a.name)}</option>`).join('')}
          </select>
          <div class="spacer"></div>
          <button class="ghost-btn" id="audit-refresh"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>Refresh</button>
          <button class="ghost-btn" id="audit-export"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>Export</button>
        </div>
        ${rows.length ? `
          <div class="audit-head"><span>Time</span><span>Agent</span><span>Task</span><span>Model</span><span class="r">Tokens</span><span class="r">Cost</span></div>
          <div class="audit-list">
            ${rows.map(e => {
              const ag = agents.find(a => a.id === e.agent_id);
              const accent = archetype(ag ? ag.archetypeKey : 'guardian').accent;
              const flagged = e.anomaly || e.stuck;
              return `<div class="audit-item${flagged ? ' flagged-row' : ''}">
                <span class="audit-time">${relTime(e.ts)}</span>
                <span class="audit-agent"><span class="av" style="background:${accent}">${esc((e.agent_name || '?')[0])}</span><strong>${esc(e.agent_name || e.agent_id)}</strong></span>
                <span class="audit-type">${esc(e.task_type || '—')}</span>
                <span><span class="model-chip">${esc(modelLabel(e.model))}</span></span>
                <span class="audit-num">${(e.tokens || 0).toLocaleString()}</span>
                <span class="audit-num audit-flags">${e.anomaly ? '<span class="flag-pill anomaly">anomaly</span>' : ''}${e.stuck ? '<span class="flag-pill stuck">stuck</span>' : ''}<span>${fmtCost(e.cost)}</span></span>
              </div>`;
            }).join('')}
          </div>` : `<div class="data-panel" style="text-align:center;color:var(--text-muted);font-size:13px;padding:34px;">No events yet. ${isLive() ? 'Run agent traffic to populate the trail.' : 'Connect to the Argus backend for the live audit trail.'}</div>`}`;
      $('audit-filter').onchange = (e) => { auditFilter = e.target.value; renderAudit(); };
      $('audit-refresh').onclick = () => fetchAudit().then(renderAudit);
      $('audit-export').onclick = exportAudit;
    }

    /* ---- Supervision inbox ---- */
    function alertReason(a) {
      if (a.status === 'killed') return 'Stopped by a human operator.';
      const L = a.live || {};
      if (L.stuck) return 'Stuck-loop detected (SPRT) — repeating with no progress.';
      if (L.action === 'block' || L.util >= 1) return 'Token budget exhausted — over its allocation.';
      if (L.anomaly) return 'Token-spend anomaly detected (CUSUM).';
      return 'Flagged by Argus governance — review recommended.';
    }
    function renderSupervision() {
      const alerts = agents.filter(a => (a.status === 'flagged' || a.status === 'killed') && !acknowledged.has(a.id));
      el.supervisionInner.innerHTML = `
        <div class="sup-section-title">Needs attention${alerts.length ? ` · ${alerts.length}` : ''}</div>
        ${alerts.length ? alerts.map(a => { const arch = archetype(a.archetypeKey); const killed = a.status === 'killed'; return `
          <div class="sup-alert">
            <span class="av" style="background:${arch.accent}">${esc(a.name[0] || 'A')}</span>
            <div class="sup-alert-body"><strong>${esc(a.name)}</strong><p>${esc(alertReason(a))}</p></div>
            <div class="sup-alert-actions">
              <button class="sup-btn" data-ack="${a.id}">Acknowledge</button>
              ${killed
                ? `<button class="sup-btn resume" data-ctl="resume" data-id="${a.id}">Reactivate</button>`
                : `<button class="sup-btn" data-ctl="pause" data-id="${a.id}">Pause</button><button class="sup-btn kill" data-ctl="kill" data-id="${a.id}">Kill</button>`}
            </div>
          </div>`; }).join('')
        : `<div class="all-clear"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg><p>All clear — every agent is within policy.</p></div>`}

        <div class="sup-section-title">Fleet controls</div>
        <div class="ctrl-list">
          ${agents.map(a => {
            const arch = archetype(a.archetypeKey), st = STATUSES[a.status] || STATUSES.active;
            const paused = a.status === 'paused', killed = a.status === 'killed';
            const actions = killed
              ? `<button class="sup-btn resume" data-ctl="resume" data-id="${a.id}">Reactivate</button>`
              : paused
                ? `<button class="sup-btn resume" data-ctl="resume" data-id="${a.id}">Resume</button><button class="sup-btn kill" data-ctl="kill" data-id="${a.id}">Kill</button>`
                : `<button class="sup-btn" data-ctl="pause" data-id="${a.id}">Pause</button><button class="sup-btn kill" data-ctl="kill" data-id="${a.id}">Kill</button>`;
            return `<div class="ctrl-row">
              <span class="av" style="background:${arch.accent}">${esc(a.name[0] || 'A')}</span>
              <div class="ctrl-row-body"><strong>${esc(a.name)}</strong><span>${esc(a.role)}</span></div>
              <span class="status-badge ${st.cls}"><span class="dot"></span>${st.label}</span>
              <div class="ctrl-row-actions">${actions}</div>
            </div>`;
          }).join('')}
        </div>`;
      el.supervisionInner.querySelectorAll('[data-ack]').forEach(b => b.onclick = () => { acknowledged.add(b.getAttribute('data-ack')); updateAlertBadge(); renderSupervision(); });
      el.supervisionInner.querySelectorAll('[data-ctl]').forEach(b => b.onclick = () => controlAgent(b.getAttribute('data-id'), b.getAttribute('data-ctl')));
    }

    /* ============================================================ TOASTS ============================================================ */
    const ICONS = {
      success: '<path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>',
      info: '<path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 4h.01"/>',
      warn: '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01"/>'
    };
    function toast(msg, kind) {
      kind = kind || 'success';
      const t = document.createElement('div');
      t.className = 'toast ' + kind;
      t.innerHTML = `<span class="ic"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">${ICONS[kind]}</svg></span><span>${esc(msg)}</span>`;
      el.toastStack.appendChild(t);
      requestAnimationFrame(() => t.classList.add('show'));
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 2600);
    }

    /* ============================================================ MODAL ============================================================ */
    function openModal(html) {
      el.modalBox.innerHTML = html;
      el.modalOverlay.classList.add('open');
      const f = el.modalBox.querySelector('input, select, button');
      if (f) setTimeout(() => f.focus(), 60);
    }
    function closeModal() { el.modalOverlay.classList.remove('open'); }

    function confirmDialog({ title, body, confirmLabel, danger, onConfirm }) {
      openModal(`
        <div class="confirm-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg></div>
        <div class="modal-head" style="margin-bottom:8px;"><div><h2>${esc(title)}</h2></div></div>
        <p style="font-size:13.5px;color:var(--text-muted);line-height:1.55;">${esc(body)}</p>
        <div class="modal-foot">
          <button class="btn" data-act="cancel">Cancel</button>
          <button class="btn ${danger ? 'danger' : 'primary'}" data-act="confirm">${esc(confirmLabel || 'Confirm')}</button>
        </div>`);
      el.modalBox.querySelector('[data-act="cancel"]').onclick = closeModal;
      el.modalBox.querySelector('[data-act="confirm"]').onclick = () => { closeModal(); onConfirm && onConfirm(); };
    }

    function openAgentModal(existing) {
      const editing = !!existing;
      const draft = editing ? { ...existing } : { archetypeKey: ARCHETYPES[0].key, name: '', role: ARCHETYPES[0].role, model: MODELS[0].id, status: 'active' };
      openModal(`
        <div class="modal-head">
          <div><h2>${editing ? 'Configure agent' : 'New agent'}</h2><p>${editing ? 'Update this agent’s setup.' : 'Pick a character, give it a role and a model.'}</p></div>
          <button class="modal-close" data-act="close"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div class="field">
          <label>Character</label>
          <div class="archetype-grid" id="arch-grid">
            ${ARCHETYPES.map(a => `
              <button type="button" class="archetype-chip${a.key === draft.archetypeKey ? ' selected' : ''}" data-arch="${a.key}">
                <span class="archetype-thumb" style="background:${a.accent}">${esc(a.name[0])}</span><span>${esc(a.name)}</span>
              </button>`).join('')}
          </div>
        </div>
        <div class="field"><label for="f-name">Agent name</label><input type="text" id="f-name" maxlength="40" placeholder="e.g. Sentinel" value="${esc(draft.name)}"></div>
        <div class="field"><label for="f-role">Role</label><input type="text" id="f-role" maxlength="48" placeholder="What does it do?" value="${esc(draft.role)}"></div>
        <div class="field-row">
          <div class="field"><label for="f-model">Model</label><select id="f-model">${MODELS.map(m => `<option value="${m.id}"${m.id === draft.model ? ' selected' : ''}>${m.label}</option>`).join('')}</select></div>
          <div class="field"><label for="f-status">Status</label><select id="f-status">${Object.keys(STATUSES).map(s => `<option value="${s}"${s === (draft.status||'active') ? ' selected' : ''}>${STATUSES[s].label}</option>`).join('')}</select></div>
        </div>
        <div class="modal-foot">
          <button class="btn" data-act="close">Cancel</button>
          <button class="btn primary" data-act="save">${editing ? 'Save changes' : 'Create agent'}</button>
        </div>`);

      const nameInput = $('f-name'), roleInput = $('f-role');
      let selectedArch = draft.archetypeKey;
      let nameTouched = editing && draft.name !== archetype(draft.archetypeKey).name;
      let roleTouched = editing && draft.role !== archetype(draft.archetypeKey).role;
      nameInput.addEventListener('input', () => { nameTouched = true; });
      roleInput.addEventListener('input', () => { roleTouched = true; });

      el.modalBox.querySelectorAll('[data-arch]').forEach(chip => chip.addEventListener('click', () => {
        selectedArch = chip.getAttribute('data-arch');
        el.modalBox.querySelectorAll('.archetype-chip').forEach(c => c.classList.toggle('selected', c === chip));
        const a = archetype(selectedArch);
        if (!nameTouched || !nameInput.value.trim()) nameInput.value = a.name;
        if (!roleTouched || !roleInput.value.trim()) roleInput.value = a.role;
      }));

      el.modalBox.querySelectorAll('[data-act="close"]').forEach(b => b.onclick = closeModal);
      el.modalBox.querySelector('[data-act="save"]').onclick = () => {
        const a = archetype(selectedArch);
        const name = nameInput.value.trim() || a.name;
        const role = roleInput.value.trim() || a.role;
        const model = $('f-model').value, status = $('f-status').value;
        if (editing) {
          const target = agents.find(x => x.id === existing.id);
          if (target) {
            const sceneChanged = target.archetypeKey !== selectedArch;
            Object.assign(target, { name, role, model, status, archetypeKey: selectedArch });
            if (sceneChanged) { target.sceneKey = a.sceneKey; target.variantIndex = 0; }
          }
          saveAgents(); renderWorkspace(); closeModal(); toast(`“${name}” updated`, 'success');
        } else {
          agents.push({ id: uid(), name, archetypeKey: selectedArch, sceneKey: a.sceneKey, variantIndex: 0, role, model, status, task: a.task, metrics: seededMetrics(uid()) });
          currentIndex = agents.length - 1;
          saveAgents();
          if (currentView !== 'home') switchView('home');
          renderWorkspace(); closeModal(); toast(`“${name}” deployed`, 'success');
        }
      };
    }

    /* ============================================================ RENDER: AGENT LIST ============================================================ */

    /* ============================================================ RENDER: DETAIL ============================================================ */

            <div class="meta-tile"><div class="v">${(L.tokens || 0).toLocaleString()}</div><div class="l">Tokens</div></div>

          </div>
          <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--text-muted);font-weight:600;margin-bottom:4px;">
            <span>Budget used</span><span style="color:${utilColor}">${util}% · quality ${q}</span>

          <div class="agent-detail-actions" style="margin-top:14px;">
